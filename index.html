function setTool(tool){
  currentTool=tool;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  document.body.className=document.body.className.split(/\s+/).filter(c=>!c.startsWith('tool-')).join(' ')+' tool-'+tool;
  const tn=document.getElementById('cur-tool-name'); if(tn) tn.textContent=TOOL_NAMES[tool];
  selectionSet.clear();
  if(drawingFlow && tool!=='flow'){drawingFlow=null;}
  if(drawingPassage && tool!=='passage'){drawingPassage=null;}
  if(drawingSite && tool!=='site'){drawingSite=null;}
  if(rubberBand){rubberBand=null; document.getElementById('rubber-band')?.remove();}
  if(document.activeElement && document.activeElement!==document.body) document.activeElement.blur();
  buildSVG();
}

// ═══════════════ МЫШЬ ═══════════════
function onSvgMouseDown(e){
  // средняя кнопка или Space-режим — pan
  if(e.button===1 || spaceHeld){
    e.preventDefault();
    startPan(e);
    return;
  }
  if(e.button!==0)return;
  if(!editMode) return;
  const p=svgPoint(e);
  const tg=e.target;
  const kind=tg.dataset && tg.dataset.kind;

  if(currentTool==='vertex'){
    if(kind==='vertex'){
      e.preventDefault();
      vertexDragging={bid:tg.dataset.bid,idx:+tg.dataset.idx};
    } else if(kind==='site-vertex'){
      e.preventDefault();
      vertexDragging={site:true,idx:+tg.dataset.idx};
    }
    return;
  }

  if(kind==='site-delete'){
    e.preventDefault();
    clearSite();
    return;
  }

  if(currentTool==='site'){
    e.preventDefault();
    if(!drawingSite) drawingSite={points:[]};
    drawingSite.points.push([Math.round(p.x),Math.round(p.y)]);
    buildSVG();
    return;
  }

  // создание надписи
  if(currentTool==='annot' && kind!=='annot'){
    e.preventDefault();
    myPrompt('Текст надписи:','').then(text=>{
      if(!text||!text.trim()) return;
      annotations.push({id:'ann-'+Date.now(), x:Math.round(p.x), y:Math.round(p.y), text:text.trim(), fontSize:14, color:'#e94560', bold:true});
      saveAll(); pushHistory(); buildSVG();
    });
    return;
  }

  // перетаскивание аннотации (pointer или annot)
  if(kind==='annot' && (currentTool==='pointer'||currentTool==='annot')){
    e.preventDefault();
    const ann=annotations.find(a=>a.id===tg.dataset.id);
    if(!ann) return;
    dragState={type:'annot', ann, ox:p.x-ann.x, oy:p.y-ann.y};
    return;
  }

  // перетаскивание подписи корпуса (в любом инструменте, лишь бы был режим редактирования)
  if(kind==='bld-label'){
    e.preventDefault();
    const bid=tg.dataset.bid;
    const b=BUILDINGS.find(x=>x.id===bid);
    if(!b) return;
    // текущая позиция метки
    const cur = (Array.isArray(b.labelXY)&&b.labelXY.length===2) ? [b.labelXY[0],b.labelXY[1]] : [parseFloat(tg.getAttribute('x'))||0, parseFloat(tg.getAttribute('y'))||0];
    dragState={type:'bld-label', bid, origX:cur[0], origY:cur[1], startX:p.x, startY:p.y, moved:false};
    return;
  }

  if(currentTool==='pointer'){
    if(kind==='flow-vertex'){e.preventDefault(); dragState={type:'flow-vertex', id:tg.dataset.id, idx:+tg.dataset.idx, moved:false}; return;}
    if(kind==='group-align'){e.preventDefault(); alignSelection(tg.dataset.role); return;}
    if(kind==='l-side'){
      e.preventDefault();
      const id=tg.dataset.id; const role=tg.dataset.role;
      const s=stalls[id]; if(!s) return;
      const orig={x:s.x,y:s.y,w:s.w,h:s.h, cw:s.cut.cw, ch:s.cut.ch, corner:s.cut.corner};
      dragState={type:'l-side', id, role, orig, startX:p.x, startY:p.y, moved:false};
      return;
    }
    if(kind==='group-resize'){
      e.preventDefault();
      const bb=getGroupBBox(); if(!bb)return;
      const role=tg.dataset.role;
      let anchor;
      if(role==='nw') anchor={x:bb.maxX, y:bb.maxY};
      else if(role==='ne') anchor={x:bb.minX, y:bb.maxY};
      else if(role==='sw') anchor={x:bb.maxX, y:bb.minY};
      else if(role==='se') anchor={x:bb.minX, y:bb.minY};
      else if(role==='n')  anchor={x:bb.minX, y:bb.maxY}; // тянем верх — низ фиксируем
      else if(role==='s')  anchor={x:bb.minX, y:bb.minY}; // тянем низ — верх фиксируем
      else if(role==='w')  anchor={x:bb.maxX, y:bb.minY}; // тянем лево — право фиксируем
      else                  anchor={x:bb.minX, y:bb.minY}; // 'e' — тянем право — лево фиксируем
      const origs=selectionItems().map(({type,id})=>{
        if(type==='stall'){const s=stalls[id]; return s?{type,id,x:s.x,y:s.y,w:s.w,h:s.h,r:s.r||0, cw:s.cut?.cw, ch:s.cut?.ch}:null;}
        if(type==='passage'){const ps=passages.find(p=>p.id===id); return ps?{type,id,x:ps.x,y:ps.y,w:ps.w,h:ps.h,r:ps.r||0}:null;}
        if(type==='flow'){const f=flows.find(x=>x.id===id); return f?{type,id,points:f.points.map(p=>[p[0],p[1]])}:null;}
      }).filter(Boolean);
      dragState={type:'group-resize', role, anchor, origs, origW:Math.max(1,bb.w), origH:Math.max(1,bb.h), moved:false};
      return;
    }
    if(kind==='group-rotate'){
      e.preventDefault();
      const bb=getGroupBBox(); if(!bb)return;
      const startAngle=Math.atan2(p.y-bb.cy, p.x-bb.cx);
      const origs=selectionItems().map(({type,id})=>{
        if(type==='stall'){const s=stalls[id]; return s?{type,id,x:s.x,y:s.y,w:s.w,h:s.h,r:s.r||0}:null;}
        if(type==='passage'){const ps=passages.find(p=>p.id===id); return ps?{type,id,x:ps.x,y:ps.y,w:ps.w,h:ps.h,r:ps.r||0}:null;}
        if(type==='flow'){const f=flows.find(x=>x.id===id); return f?{type,id,points:f.points.map(p=>[p[0],p[1]])}:null;}
      }).filter(Boolean);
      dragState={type:'group-rotate', center:{x:bb.cx,y:bb.cy}, startAngle, origs, moved:false};
      return;
    }

    if(kind==='stall' || kind==='passage' || kind==='flow'){
      e.preventDefault();
      const id=tg.dataset.id;
      if(e.shiftKey){
        if(isSelected(kind,id)) selectionRemove(kind,id);
        else selectionAdd(kind,id);
        buildSVG();
        return;
      }
      const wasOnlySelected = isSelected(kind,id) && selectionSet.size===1;
      if(!isSelected(kind,id)) selectionReplace(kind,id);
      // блочный drag всех выделенных
      const origs=selectionItems().map(({type,id})=>{
        if(type==='stall'){const s=stalls[id]; return s?{type,id,x:s.x,y:s.y}:null;}
        if(type==='passage'){const ps=passages.find(p=>p.id===id); return ps?{type,id,x:ps.x,y:ps.y}:null;}
        if(type==='flow'){const f=flows.find(x=>x.id===id); return f?{type,id,points:f.points.map(p=>[p[0],p[1]])}:null;}
      }).filter(Boolean);
      dragState={type:'block', startX:p.x, startY:p.y, origs, moved:false};
      // не пересобираем DOM, если selection не изменилось — иначе ломается dblclick
      if(!wasOnlySelected) buildSVG();
      return;
    }

    // mousedown по пустому — рамка выделения
    e.preventDefault();
    if(!e.shiftKey) selectionSet.clear();
    rubberBand={x0:p.x, y0:p.y, x1:p.x, y1:p.y, prevSel:new Set(selectionSet)};
    buildSVG();
    return;
  }

  if(currentTool==='stall'){
    e.preventDefault();
    const w=30,h=24;
    const bid=whichBuilding(p.x,p.y)||'X';
    const id=getNextStallId(bid);
    stalls[id]={x:Math.round(p.x-w/2),y:Math.round(p.y-h/2),w,h,building:bid};
    saveAll(); pushHistory();
    selectionReplace('stall',id);
    buildSVG(); updateStats(); renderFloorTabs();
    return;
  }

  if(currentTool==='passage'){
    e.preventDefault();
    drawingPassage={x0:p.x,y0:p.y,x1:p.x,y1:p.y};
    const svg=document.getElementById('ymap');
    svg.appendChild(el('rect',{
      id:'passage-ghost', x:p.x,y:p.y,width:0,height:0,
      fill:'rgba(74,144,217,.25)',stroke:'#4a90d9','stroke-width':1.5,
      'stroke-dasharray':'4,3','pointer-events':'none',
    }));
    return;
  }

  if(currentTool==='flow'){
    e.preventDefault();
    if(!drawingFlow){
      drawingFlow={points:[[Math.round(p.x),Math.round(p.y)]]};
    } else {
      drawingFlow.points.push([Math.round(p.x),Math.round(p.y)]);
    }
    buildSVG();
    return;
  }

  if(currentTool==='delete'){
    e.preventDefault();
    if(kind==='stall'){
      delete stalls[tg.dataset.id]; saveAll(); pushHistory(); buildSVG(); updateStats(); renderFloorTabs();
    } else if(kind==='passage'){
      const idx=passages.findIndex(p=>p.id===tg.dataset.id);
      if(idx>=0){passages.splice(idx,1); saveAll(); pushHistory(); buildSVG(); updateStats();}
    } else if(kind==='flow'){
      const idx=flows.findIndex(p=>p.id===tg.dataset.id);
      if(idx>=0){flows.splice(idx,1); saveAll(); pushHistory(); buildSVG(); updateStats();}
    } else if(kind==='vertex'){
      removeVertex(e);
    } else if(kind==='annot'){
      const idx=annotations.findIndex(a=>a.id===tg.dataset.id);
      if(idx>=0){annotations.splice(idx,1); saveAll(); pushHistory(); buildSVG();}
    }
    return;
  }
}

function onDocMouseMove(e){
  if(panState){doPan(e); return;}
  if(vertexDragging){
    const p=svgPoint(e);
    const x=Math.round(p.x),y=Math.round(p.y);
    if(vertexDragging.site){
      const site=floors[currentFloorIdx].site;
      if(!site) return;
      const pts=parsePath(site.path);
      pts[vertexDragging.idx]=[x,y];
      site.path=pointsToPath(pts);
      buildSVG();
      return;
    }
    const b=BUILDINGS.find(x=>x.id===vertexDragging.bid);
    const pts=parsePath(b.path);
    pts[vertexDragging.idx]=[x,y];
    b.path=pointsToPath(pts);
    const pathEl=document.getElementById(`bld-${b.id}`);
    if(pathEl) pathEl.setAttribute('d',b.path);
    const handle=document.querySelector(`.vertex-handle[data-bid="${b.id}"][data-idx="${vertexDragging.idx}"]`);
    if(handle){handle.setAttribute('cx',x);handle.setAttribute('cy',y);}
    syncPathInput(b.id);
    return;
  }

  if(dragState){
    const p=svgPoint(e);
    if(dragState.type==='annot'){
      dragState.ann.x=Math.round(p.x-dragState.ox);
      dragState.ann.y=Math.round(p.y-dragState.oy);
      buildSVG(); return;
    }
    if(dragState.type==='group-resize'){
      const role=dragState.role;
      let sx=(p.x-dragState.anchor.x)/((role==='nw'||role==='sw'||role==='w')?-dragState.origW:dragState.origW);
      let sy=(p.y-dragState.anchor.y)/((role==='nw'||role==='ne'||role==='n')?-dragState.origH:dragState.origH);
      // боковые ручки — только одна ось меняется, другая остаётся как была (sx=1 или sy=1)
      if(role==='n'||role==='s') sx=1;
      if(role==='w'||role==='e') sy=1;
      // защита от нулевого/слишком маленького масштаба
      if(Math.abs(sx)<0.1) sx=sx<0?-0.1:0.1;
      if(Math.abs(sy)<0.1) sy=sy<0?-0.1:0.1;
      if(e.shiftKey && !(role==='n'||role==='s'||role==='w'||role==='e')){const s=Math.min(Math.abs(sx),Math.abs(sy)); sx=Math.sign(sx)*s; sy=Math.sign(sy)*s;}
      for(const o of dragState.origs){
        if(o.type==='stall'||o.type==='passage'){
          const target=o.type==='stall'?stalls[o.id]:passages.find(p=>p.id===o.id);
          if(!target)continue;
          // считаем оба угла, потом округляем — края соседних прилавков точно совпадут
          const x1=Math.round(dragState.anchor.x+(o.x-dragState.anchor.x)*sx);
          const x2=Math.round(dragState.anchor.x+(o.x+o.w-dragState.anchor.x)*sx);
          const y1=Math.round(dragState.anchor.y+(o.y-dragState.anchor.y)*sy);
          const y2=Math.round(dragState.anchor.y+(o.y+o.h-dragState.anchor.y)*sy);
          target.x=Math.min(x1,x2);
          target.y=Math.min(y1,y2);
          target.w=Math.max(1,Math.abs(x2-x1));
          target.h=Math.max(1,Math.abs(y2-y1));
          // L/П-стол: масштабируем вырез пропорционально
          if(o.type==='stall' && (target.shape==='L'||target.shape==='P') && target.cut && o.cw && o.ch && o.w && o.h){
            target.cut.cw=Math.max(2, Math.min(target.w-2, Math.round(o.cw*target.w/o.w)));
            target.cut.ch=Math.max(2, Math.min(target.h-2, Math.round(o.ch*target.h/o.h)));
          }
        } else if(o.type==='flow'){
          const f=flows.find(x=>x.id===o.id);
          if(!f)continue;
          f.points=o.points.map(pt=>[
            Math.round(dragState.anchor.x+(pt[0]-dragState.anchor.x)*sx),
            Math.round(dragState.anchor.y+(pt[1]-dragState.anchor.y)*sy)
          ]);
        }
      }
      dragState.moved=true;
      buildSVG();
      return;
    }
    if(dragState.type==='group-rotate'){
      const cur=Math.atan2(p.y-dragState.center.y, p.x-dragState.center.x);
      let delta=cur-dragState.startAngle;
      if(e.shiftKey){const step=Math.PI/12; delta=Math.round(delta/step)*step;}
      const cs=Math.cos(delta), sn=Math.sin(delta);
      const cx0=dragState.center.x, cy0=dragState.center.y;
      for(const o of dragState.origs){
        if(o.type==='stall'||o.type==='passage'){
          const target=o.type==='stall'?stalls[o.id]:passages.find(p=>p.id===o.id);
          if(!target)continue;
          const rcx=o.x+o.w/2, rcy=o.y+o.h/2;
          const dx=rcx-cx0, dy=rcy-cy0;
          const ncx=cx0+dx*cs-dy*sn, ncy=cy0+dx*sn+dy*cs;
          target.r=((o.r||0)+delta*180/Math.PI);
          target.x=Math.round(ncx-target.w/2);
          target.y=Math.round(ncy-target.h/2);
        } else if(o.type==='flow'){
          const f=flows.find(x=>x.id===o.id);
          if(!f)continue;
          f.points=o.points.map(pt=>{
            const dx=pt[0]-cx0, dy=pt[1]-cy0;
            return [Math.round(cx0+dx*cs-dy*sn), Math.round(cy0+dx*sn+dy*cs)];
          });
        }
      }
      dragState.moved=true;
      buildSVG();
      return;
    }
    if(dragState.type==='block'){
      const dx=p.x-dragState.startX, dy=p.y-dragState.startY;
      for(const orig of dragState.origs){
        if(orig.type==='stall'){const s=stalls[orig.id]; if(s){s.x=Math.round(orig.x+dx); s.y=Math.round(orig.y+dy);}}
        else if(orig.type==='passage'){const ps=passages.find(p=>p.id===orig.id); if(ps){ps.x=Math.round(orig.x+dx); ps.y=Math.round(orig.y+dy);}}
        else if(orig.type==='flow'){const f=flows.find(x=>x.id===orig.id); if(f){f.points=orig.points.map(pt=>[Math.round(pt[0]+dx), Math.round(pt[1]+dy)]);}}
      }
      if(!dragState.moved && (Math.abs(dx)>2||Math.abs(dy)>2)) dragState.moved=true;
      buildSVG();
      return;
    }
    if(dragState.type==='flow-vertex'){
      const f=flows.find(x=>x.id===dragState.id);
      if(f){
        f.points[dragState.idx]=[Math.round(p.x), Math.round(p.y)];
        if(!dragState.moved) dragState.moved=true;
        buildSVG();
      }
      return;
    }
    if(dragState.type==='bld-label'){
      const b=BUILDINGS.find(x=>x.id===dragState.bid);
      if(b){
        const nx=Math.round(dragState.origX + (p.x-dragState.startX));
        const ny=Math.round(dragState.origY + (p.y-dragState.startY));
        b.labelXY=[nx,ny];
        if(!dragState.moved) dragState.moved=true;
        buildSVG();
      }
      return;
    }
    if(dragState.type==='l-side'){
      const s=stalls[dragState.id]; if(!s){return;}
      const o=dragState.orig, role=dragState.role, c=o.corner;
      let nx=o.x, ny=o.y, nw=o.w, nh=o.h, ncw=o.cw, nch=o.ch;
      if(role==='top'){
        const ny2=Math.round(Math.min(p.y, o.y+o.h-8));
        nh=o.y+o.h-ny2; ny=ny2;
      } else if(role==='bottom'){
        nh=Math.max(8, Math.round(p.y-o.y));
      } else if(role==='left'){
        const nx2=Math.round(Math.min(p.x, o.x+o.w-8));
        nw=o.x+o.w-nx2; nx=nx2;
      } else if(role==='right'){
        nw=Math.max(8, Math.round(p.x-o.x));
      } else if(role==='notch-v'){
        // вертикальная стенка выреза — двигаем X, меняем cw
        if(c==='tr'||c==='br') ncw=Math.round(o.x+o.w-p.x);
        else ncw=Math.round(p.x-o.x);
      } else if(role==='notch-h'){
        // горизонтальная стенка выреза — двигаем Y, меняем ch
        if(c==='tr'||c==='tl') nch=Math.round(p.y-o.y);
        else nch=Math.round(o.y+o.h-p.y);
      }
      // клампы
      ncw=Math.max(2, Math.min(ncw, nw-2));
      nch=Math.max(2, Math.min(nch, nh-2));
      s.x=nx; s.y=ny; s.w=nw; s.h=nh;
      s.cut.cw=ncw; s.cut.ch=nch;
      if(!dragState.moved) dragState.moved=true;
      buildSVG();
      return;
    }
    if(dragState.type==='resize'){
      const single=selectionSingle();
      if(!single) return;
      if(single.type==='stall'){
        const s=stalls[single.id];
        s.w=Math.max(8,Math.round(p.x-s.x));
        s.h=Math.max(8,Math.round(p.y-s.y));
        const rect=document.getElementById('stall-'+single.id);
        if(rect){rect.setAttribute('width',s.w);rect.setAttribute('height',s.h);}
        moveResizeHandle(s);
      } else if(single.type==='passage'){
        const ps=passages.find(p=>p.id===single.id);
        ps.w=Math.max(10,Math.round(p.x-ps.x));
        ps.h=Math.max(10,Math.round(p.y-ps.y));
        const rect=document.getElementById('psg-'+ps.id);
        if(rect){rect.setAttribute('width',ps.w);rect.setAttribute('height',ps.h);}
        moveResizeHandle(ps);
      }
      if(!dragState.moved) dragState.moved=true;
      return;
    }
    return;
  }

  // rubber-band selection
  if(rubberBand){
    const p=svgPoint(e);
    rubberBand.x1=p.x; rubberBand.y1=p.y;
    let ghost=document.getElementById('rubber-band');
    const svg=document.getElementById('ymap');
    if(!ghost){
      ghost=el('rect',{id:'rubber-band',fill:'rgba(255,230,0,.08)',stroke:'#ffe600','stroke-width':1,'stroke-dasharray':'4,3','pointer-events':'none'});
      svg.appendChild(ghost);
    }
    const x=Math.min(rubberBand.x0,rubberBand.x1);
    const y=Math.min(rubberBand.y0,rubberBand.y1);
    const w=Math.abs(rubberBand.x1-rubberBand.x0);
    const h=Math.abs(rubberBand.y1-rubberBand.y0);
    ghost.setAttribute('x',x); ghost.setAttribute('y',y);
    ghost.setAttribute('width',w); ghost.setAttribute('height',h);
    return;
  }

  if(drawingPassage){
    const p=svgPoint(e);
    drawingPassage.x1=p.x;drawingPassage.y1=p.y;
    const ghost=document.getElementById('passage-ghost');
    if(ghost){
      const x=Math.min(drawingPassage.x0,drawingPassage.x1);
      const y=Math.min(drawingPassage.y0,drawingPassage.y1);
      const w=Math.abs(drawingPassage.x1-drawingPassage.x0);
      const h=Math.abs(drawingPassage.y1-drawingPassage.y0);
      ghost.setAttribute('x',x);ghost.setAttribute('y',y);
      ghost.setAttribute('width',w);ghost.setAttribute('height',h);
    }
    return;
  }

  // flow: пунктир от последней точки до курсора
  if(drawingFlow && drawingFlow.points.length>=1 && currentTool==='flow'){
    const p=svgPoint(e);
    const last=drawingFlow.points[drawingFlow.points.length-1];
    let pending=document.getElementById('flow-pending');
    const svg=document.getElementById('ymap');
    if(!pending){
      pending=el('line',{id:'flow-pending', stroke:'#3498db','stroke-width':2.5,'stroke-dasharray':'5,4',opacity:.6,'pointer-events':'none'});
      svg.appendChild(pending);
    }
    pending.setAttribute('x1',last[0]); pending.setAttribute('y1',last[1]);
    pending.setAttribute('x2',p.x); pending.setAttribute('y2',p.y);
  }
}

function onDocMouseUp(e){
  if(panState){endPan(); return;}
  if(vertexDragging){saveAll(); pushHistory(); vertexDragging=null;}
  if(dragState){
    if(dragState.type==='annot'){saveAll(); pushHistory(); dragState=null; return;}
    const wasMoved=dragState.moved;
    if(wasMoved){saveAll(); pushHistory();}
    dragState=null;
  }
  if(rubberBand){
    document.getElementById('rubber-band')?.remove();
    const x=Math.min(rubberBand.x0,rubberBand.x1);
    const y=Math.min(rubberBand.y0,rubberBand.y1);
    const w=Math.abs(rubberBand.x1-rubberBand.x0);
    const h=Math.abs(rubberBand.y1-rubberBand.y0);
    if(w>=3 && h>=3){
      for(const [id,s] of Object.entries(stalls)){
        if(rectOverlap({x:s.x,y:s.y,w:s.w,h:s.h},{x,y,w,h})) selectionAdd('stall',id);
      }
      for(const ps of passages){
        if(rectOverlap({x:ps.x,y:ps.y,w:ps.w,h:ps.h},{x,y,w,h})) selectionAdd('passage',ps.id);
      }
      for(const f of flows){
        const hit=f.points.some(pt=>pt[0]>=x && pt[0]<=x+w && pt[1]>=y && pt[1]<=y+h);
        if(hit) selectionAdd('flow',f.id);
      }
    }
    rubberBand=null;
    buildSVG();
  }
  if(drawingPassage){
    const ghost=document.getElementById('passage-ghost');
    if(ghost) ghost.remove();
    const x=Math.min(drawingPassage.x0,drawingPassage.x1);
    const y=Math.min(drawingPassage.y0,drawingPassage.y1);
    const w=Math.abs(drawingPassage.x1-drawingPassage.x0);
    const h=Math.abs(drawingPassage.y1-drawingPassage.y0);
    drawingPassage=null;
    if(w>=6&&h>=6){
      editZone('main','').then(result=>{
        if(!result || result==='delete') return;
        passages.push({id:'P'+Date.now(),x:Math.round(x),y:Math.round(y),w:Math.round(w),h:Math.round(h),label:result.label||'',type:result.type||'main'});
        saveAll(); pushHistory(); buildSVG(); updateStats();
      });
    }
  }
}

function onSvgContextMenu(e){
  if(!editMode) return;
  const tg=e.target;
  const kind=tg.dataset && tg.dataset.kind;
  if(kind==='stall'){
    e.preventDefault();
    delete stalls[tg.dataset.id]; saveAll(); pushHistory(); buildSVG(); updateStats(); renderFloorTabs();
  } else if(kind==='passage'){
    e.preventDefault();
    const idx=passages.findIndex(p=>p.id===tg.dataset.id);
    if(idx>=0){passages.splice(idx,1); saveAll(); pushHistory(); buildSVG(); updateStats();}
  } else if(kind==='flow'){
    e.preventDefault();
    const idx=flows.findIndex(p=>p.id===tg.dataset.id);
    if(idx>=0){flows.splice(idx,1); saveAll(); pushHistory(); buildSVG(); updateStats();}
  } else if(kind==='vertex'){
    e.preventDefault();
    removeVertex(e);
  } else if(kind==='annot'){
    e.preventDefault();
    const idx=annotations.findIndex(a=>a.id===tg.dataset.id);
    if(idx>=0){annotations.splice(idx,1); saveAll(); pushHistory(); buildSVG();}
  }
}

function onSvgDblClick(e){
  if(!editMode) return;
  // закончить рисование потока на двойном клике
  if(currentTool==='flow' && drawingFlow){
    e.preventDefault();
    if(drawingFlow.points.length>=2) drawingFlow.points.pop();
    finishFlow();
    return;
  }
  if(currentTool==='vertex' && e.target.dataset && e.target.dataset.kind==='vertex'){
    insertVertex(e);
    return;
  }
  // двойной клик по аннотации — редактировать текст
  if(e.target.dataset && e.target.dataset.kind==='annot'){
    e.preventDefault();
    const ann=annotations.find(a=>a.id===e.target.dataset.id);
    if(!ann) return;
    myPrompt('Текст надписи:', ann.text).then(t=>{
      if(t===null) return;
      if(!t.trim()){annotations.splice(annotations.indexOf(ann),1);}
      else {ann.text=t.trim();}
      saveAll(); pushHistory(); buildSVG();
    });
    return;
  }
  // двойной клик по подписи участка — редактировать
  if(e.target.dataset && e.target.dataset.kind==='site-label'){
    e.preventDefault();
    editSiteLabel();
    return;
  }
  // завершить рисование участка
  if(currentTool==='site' && drawingSite){
    e.preventDefault();
    finishSite();
    return;
  }
  // двойной клик по прилавку — переименовать вручную
  if(currentTool==='pointer' && e.target.dataset && e.target.dataset.kind==='stall'){
    e.preventDefault();
    dragState=null;
    renameStallInEdit(e.target.dataset.id);
    return;
  }
  // двойной клик по зоне — редактировать тип/подпись
  if(currentTool==='pointer' && e.target.dataset && e.target.dataset.kind==='passage'){
    e.preventDefault();
    const id=e.target.dataset.id;
    const p=passages.find(x=>x.id===id);
    if(!p) return;
    dragState=null;
    editZone(p.type||'main', p.label||'', {canDelete:true}).then(result=>{
      if(!result) return;
      if(result==='delete'){
        const idx=passages.findIndex(x=>x.id===id);
        if(idx>=0){passages.splice(idx,1); saveAll(); pushHistory(); buildSVG(); updateStats();}
        return;
      }
      p.type=result.type;
      p.label=result.label;
      saveAll(); pushHistory(); buildSVG();
    });
    return;
  }
  // двойной клик по потоку в pointer tool — редактировать чел/час
  if(currentTool==='pointer' && e.target.dataset && e.target.dataset.kind==='flow'){
    e.preventDefault();
    const id=e.target.dataset.id;
    const f=flows.find(x=>x.id===id);
    if(!f) return;
    // отменим drag, который запустился по mousedown первого клика
    dragState=null;
    myPrompt(`Чел/сутки для потока «${id}»:`, f.count||0, {type:'number'}).then(newCount=>{
      if(newCount===null) return;
      f.count=Math.max(0, parseInt(newCount,10)||0);
      saveAll(); pushHistory(); buildSVG(); updateStats();
    });
  }
}

function finishSite(){
  if(!drawingSite) return;
  const pts=drawingSite.points.slice();
  if(pts.length<3){drawingSite=null; buildSVG(); return;}
  const path='M '+pts.map(p=>`${p[0]} ${p[1]}`).join(' L ')+' Z';
  myPrompt('Подпись участка (можно оставить пустой):', floors[currentFloorIdx].site?.label || 'Участок').then(label=>{
    if(label===null){drawingSite=null; buildSVG(); return;}
    const f=floors[currentFloorIdx];
    f.site={path, label:label.trim(), labelXY:[pts[0][0]+10, pts[0][1]+22]};
    drawingSite=null;
    saveAll(); pushHistory();
    setTool('pointer');
    buildSVG();
  });
}

function editSiteLabel(){
  const f=floors[currentFloorIdx];
  if(!f.site) return;
  myPrompt('Подпись участка:', f.site.label||'').then(v=>{
    if(v===null) return;
    f.site.label=v.trim();
    saveAll(); pushHistory(); buildSVG();
  });
}

function onSiteToolClick(){
  const f=floors[currentFloorIdx];
  if(f && f.site){
    // спрашиваем что делать с существующим контуром
    const choice = prompt('Контур участка уже задан. Что сделать?\n\n1 — Перерисовать с нуля\n2 — Удалить\n3 — Изменить подпись\n(Enter / пусто = отмена)','');
    if(choice==='1'){ f.site=null; saveAll(); pushHistory(); buildSVG(); setTool('site'); }
    else if(choice==='2'){ f.site=null; saveAll(); pushHistory(); buildSVG(); flashStatus('Контур участка удалён'); }

function clearSite(){
  const f=floors[currentFloorIdx];
  if(!f.site) return;
  if(!confirm('Удалить контур участка?')) return;
  f.site=null;
  saveAll(); pushHistory(); buildSVG();
}

function finishFlow(){
  if(!drawingFlow || modalOpen)return;
  const pts=drawingFlow.points.slice();
  if(pts.length<2){drawingFlow=null; document.getElementById('flow-pending')?.remove(); buildSVG(); return;}
  document.getElementById('flow-pending')?.remove();
  myPrompt('Количество человек в сутки на этом отрезке:', 500, {type:'number'}).then(cnt=>{
    if(cnt===null){drawingFlow=null; buildSVG(); return;}
    const count=Math.max(0, parseInt(cnt,10)||0);
    flows.push({id:'F'+Date.now(), points:pts, count, label:''});
    saveAll(); pushHistory();
    drawingFlow=null;
    buildSVG(); updateStats();
  });
}

function moveResizeHandle(obj){
  const h=document.getElementById('resize-handle');
  if(h){h.setAttribute('x',obj.x+obj.w-5);h.setAttribute('y',obj.y+obj.h-5);}
}

function removeVertex(e){
  const bid=e.target.dataset.bid;
  const idx=+e.target.dataset.idx;
  const b=BUILDINGS.find(x=>x.id===bid);
  const pts=parsePath(b.path);
  if(pts.length<=3){alert('Минимум 3 точки в контуре.');return;}
  pts.splice(idx,1);
  b.path=pointsToPath(pts);
  saveAll(); pushHistory(); buildSVG(); syncPathInput(b.id);
}
function insertVertex(e){
  e.preventDefault();e.stopPropagation();
  const bid=e.target.dataset.bid;
  const idx=+e.target.dataset.idx;
  const b=BUILDINGS.find(x=>x.id===bid);
  const pts=parsePath(b.path);
  const next=(idx+1)%pts.length;
  const mid=[Math.round((pts[idx][0]+pts[next][0])/2),Math.round((pts[idx][1]+pts[next][1])/2)];
  pts.splice(idx+1,0,mid);
  b.path=pointsToPath(pts);
  saveAll(); pushHistory(); buildSVG(); syncPathInput(b.id);
}
function syncPathInput(bid){
  const inp=document.querySelector(`textarea[data-bid="${bid}"][data-field="path"]`);
  if(inp){const b=BUILDINGS.find(x=>x.id===bid);inp.value=b.path;}
}

document.addEventListener('keydown',e=>{
  if(!editMode){
    if((e.metaKey||e.ctrlKey) && (e.key==='z'||e.key==='Z')){
      if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
      e.preventDefault();
      if(e.shiftKey) redo(); else undo();
    }
    return;
  }
  if(e.key==='Escape'){
    selectionSet.clear();
    if(drawingPassage){drawingPassage=null;document.getElementById('passage-ghost')?.remove();}
    if(drawingFlow){drawingFlow=null;document.getElementById('flow-pending')?.remove();}
    if(drawingSite){drawingSite=null;}
    if(rubberBand){rubberBand=null;document.getElementById('rubber-band')?.remove();}
    buildSVG();
  } else if(e.key==='Enter'){
    if(drawingFlow){e.preventDefault();finishFlow();}
    else if(drawingSite){e.preventDefault();finishSite();}
  } else if(e.altKey && /^[lrtbдкеи]$/i.test(e.key)){
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    const k=e.key.toLowerCase();
    let side=null;
    if(k==='l'||k==='д') side='left';
    else if(k==='r'||k==='к') side='right';
    else if(k==='t'||k==='е') side='top';
    else if(k==='b'||k==='и') side='bottom';
    if(side && selectionSet.size>=2){
      e.preventDefault();
      alignSelection(side);
    }
  } else if(e.key==='F2'){
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    const single=selectionSingle();
    if(single && single.type==='stall'){
      e.preventDefault();
      renameStallInEdit(single.id);
    }
  } else if((e.key==='Delete'||e.key==='Backspace') && selectionSet.size>0){
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    for(const {type,id} of selectionItems()){
      if(type==='stall') delete stalls[id];
      else if(type==='passage'){const i=passages.findIndex(p=>p.id===id);if(i>=0) passages.splice(i,1);}
      else if(type==='flow'){const i=flows.findIndex(p=>p.id===id);if(i>=0) flows.splice(i,1);}
    }
    saveAll(); pushHistory();
    selectionSet.clear();
    buildSVG();updateStats();renderFloorTabs();
  } else if((e.metaKey||e.ctrlKey) && (e.key==='z'||e.key==='Z'||e.key==='я'||e.key==='Я')){
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    e.preventDefault();
    if(e.shiftKey) redo(); else undo();
  }
});

function openStall(id){
  const s=stalls[id]; if(!s)return;
  selectedId=id;
  const bld=BUILDINGS.find(x=>x.id===s.building);
  document.getElementById('sb-id').textContent=id;
  document.getElementById('sb-bld').textContent=(bld?bld.label:(s.building?s.building:'Свободное место'))+' · '+floors[currentFloorIdx].name;
  document.getElementById('f-tenant').value=s.tenant||'';
  document.getElementById('f-category').value=s.category||'';
  document.getElementById('f-rent').value=s.rent||'';
  document.getElementById('f-rent-fact').value=s.rentFact||'';
  document.getElementById('f-area').value=s.area||'';
  document.getElementById('f-counters').value=s.counters||'';
  calcDiscount();
  document.getElementById('f-notes').value=s.notes||'';
  currentImp=s.importance||'';
  updateImpButtons();
  document.querySelectorAll('.stall-rect.form-selected').forEach(r=>r.classList.remove('form-selected'));

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.querySelectorAll('.stall-rect.form-selected').forEach(r=>r.classList.remove('form-selected'));
  selectedId=null;
  setTimeout(centerView, 230);
}

function calcDiscount(){
  const plan=parseFloat(document.getElementById('f-rent').value);
  const fact=parseFloat(document.getElementById('f-rent-fact').value);
  const el=document.getElementById('f-discount');
  if(plan>0 && !isNaN(fact)){
    const pct=(fact/plan*100).toFixed(1);
    el.value=pct+'%';
  } else {
    el.value='';
  }
}
function setImp(imp){currentImp=currentImp===imp?'':imp;updateImpButtons()}
function updateImpButtons(){document.querySelectorAll('.imp-btn').forEach(b=>b.classList.toggle('active',b.dataset.imp===currentImp));}

function saveStall(){
  if(!selectedId)return;
  const s=stalls[selectedId]||{};
  Object.assign(s,{
    tenant:document.getElementById('f-tenant').value.trim(),
    category:document.getElementById('f-category').value,
    importance:currentImp,
    rent:document.getElementById('f-rent').value,
    rentFact:document.getElementById('f-rent-fact').value,
    area:document.getElementById('f-area').value,
    counters:document.getElementById('f-counters').value,
    notes:document.getElementById('f-notes').value.trim(),
  });
  stalls[selectedId]=s;
  saveAll(); pushHistory();
  buildSVG(); updateStats();
  if(editMode) renderEditPanel();
  flashSave();
}

function resetStallData(){
  if(!selectedId)return;
  if(!confirm(`Очистить данные арендатора ${selectedId}? (прилавок останется)`))return;
  const s=stalls[selectedId];
  if(s){
    delete s.tenant;delete s.category;delete s.importance;
    delete s.rent;delete s.rentFact;delete s.area;delete s.counters;delete s.notes;
    saveAll(); pushHistory();
  }
  buildSVG(); updateStats(); closeSidebar();
}

function renameStall(){
  if(!selectedId)return;
  myPrompt(`Новый ID для ${selectedId}:`, selectedId).then(newId=>{
    if(newId===null || !newId)return;
    const trimmed=newId.trim();
    if(!trimmed || trimmed===selectedId)return;
    if(stalls[trimmed]){alert(`ID "${trimmed}" уже используется.`);return;}
    stalls[trimmed]=stalls[selectedId];
    delete stalls[selectedId];
    selectedId=trimmed;
    document.getElementById('sb-id').textContent=trimmed;
    saveAll(); pushHistory();
    buildSVG(); updateStats();
  });
}

function flashSave(){
  const btn=document.querySelector('.btn-save');
  const orig=btn.textContent;
  btn.textContent='✓ Сохранено';
  btn.style.background='#27ae60';
  setTimeout(()=>{btn.textContent=orig;btn.style.background=''},1100);
}

function updateStats(){
  // считаем только прилавки, центр которых попадает в какой-то контур корпуса
  const bldPolys = BUILDINGS.map(b=>({id:b.id, pts:parsePath(b.path)}));
  const inside = (s)=>{
    const cx=s.x+s.w/2, cy=s.y+s.h/2;
    for(const bp of bldPolys){ if(pointInPolygon(cx,cy,bp.pts)) return true; }
    return false;
  };
  const c={A:0,B:0,C:0,D:0};let filled=0; let total=0;
  for(const d of Object.values(stalls)){
    if(!inside(d)) continue;
    total++;
    if(d.tenant||d.importance)filled++;
    if(d.importance)c[d.importance]++;
  }
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-passages').textContent=passages.length;
  const totalFlowPeople = flows.reduce((sum,f)=>sum + (parseInt(f.count,10)||0), 0);
  document.getElementById('st-flows').textContent=totalFlowPeople.toLocaleString('ru-RU');
  document.getElementById('st-filled').textContent=filled;
  for(const k of'ABCD')document.getElementById('st-'+k).textContent=c[k];
  document.getElementById('progress-fill').style.width=(total?filled/total*100:0)+'%';
}

function buildXLSXWorkbook(){
  const wb=XLSX.utils.book_new();
  const num=v=>{const n=Number(v); return isNaN(n)?0:n;};

  // ── Лист 1: Прилавки ──
  const stallRows=[['Этаж','ID','Корпус','X','Y','W','H','Арендатор','Категория','Важность','Аренда план','Аренда факт','Площадь м²','Кол-во прилавков','Заметки']];
  for(const fl of floors){
    const ids=Object.keys(fl.stalls).sort();
    for(const id of ids){
      const d=fl.stalls[id];
      stallRows.push([fl.name, id, d.building||'', num(d.x), num(d.y), num(d.w), num(d.h),
        d.tenant||'', d.category||'', d.importance||'',
        num(d.rent), num(d.rentFact), num(d.area), num(d.counters), d.notes||'']);
    }
  }
  const ws1=XLSX.utils.aoa_to_sheet(stallRows);
  ws1['!cols']=[{wch:10},{wch:12},{wch:8},{wch:6},{wch:6},{wch:6},{wch:6},{wch:28},{wch:22},{wch:8},{wch:13},{wch:13},{wch:12},{wch:30}];
  ws1['!freeze']={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb, ws1, 'Прилавки');

  // ── Лист 2: Пешеходные потоки ──
  const flowRows=[['Этаж','ID','Чел/сутки','Точек','Координаты (x;y | x;y | ...)']];
  for(const fl of floors){
    for(const f of fl.flows){
      flowRows.push([fl.name, f.id, num(f.count), f.points.length, f.points.map(p=>p.join(';')).join(' | ')]);
    }
  }
  const ws2=XLSX.utils.aoa_to_sheet(flowRows);
  ws2['!cols']=[{wch:10},{wch:14},{wch:10},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Потоки');

  // ── Лист 3: Сводка по корпусам ──
  const sumRows=[['Этаж','Корпус','Название','Площадь корпуса м²','Прилавков','Заполнено','Сумма площадей прилавков м²','Утилизация %','Аренда ₽/мес','Аренда ₽/м² (по корпусу)','Аренда ₽/м² (по прилавкам)','Ср. аренда','A','B','C','D','Пустые']];
  let GtCount=0,GtFilled=0,GtRent=0,GtRev=0,GtA=0,GtB=0,GtC=0,GtD=0,GtEmpty=0;
  for(const fl of floors){
    const groups={};
    for(const s of Object.values(fl.stalls)){
      const bld=s.building||'X';
      (groups[bld]=groups[bld]||[]).push(s);
    }
    const order=[...DEFAULT_BUILDINGS.map(b=>b.id),'X'];
    for(const bid of Object.keys(groups)) if(!order.includes(bid)) order.push(bid);
    let tCount=0,tFilled=0,tRent=0,tStallArea=0,tBldArea=0,tA=0,tB=0,tC=0,tD=0,tEmpty=0;
    for(const bid of order){
      const list=groups[bid];if(!list)continue;
      const bld=fl.buildings.find(x=>x.id===bid);
      const name=bld?bld.label:'(вне зданий)';
      const bldArea=bld?num(bld.area):0;
      const count=list.length;
      const filled=list.filter(s=>s.tenant||s.importance).length;
      const sumRent=list.reduce((a,s)=>a+num(s.rent),0);
      const sumStallArea=list.reduce((a,s)=>a+num(s.area),0);
      const util=bldArea?Math.round(sumStallArea/bldArea*1000)/10:0;
      const a=list.filter(s=>s.importance==='A').length;
      const b=list.filter(s=>s.importance==='B').length;
      const c=list.filter(s=>s.importance==='C').length;
      const d=list.filter(s=>s.importance==='D').length;
      const empty=count-filled;
      sumRows.push([fl.name, bid, name, bldArea, count, filled,
        Math.round(sumStallArea*10)/10, util,
        sumRent,
        bldArea?Math.round(sumRent/bldArea):0,
        sumStallArea?Math.round(sumRent/sumStallArea):0,
        filled?Math.round(sumRent/filled):0,
        a,b,c,d,empty]);
      tCount+=count;tFilled+=filled;tRent+=sumRent;
      tStallArea+=sumStallArea;tBldArea+=bldArea;
      tA+=a;tB+=b;tC+=c;tD+=d;tEmpty+=empty;
    }
    sumRows.push([fl.name,'ИТОГО','—',tBldArea,tCount,tFilled,
      Math.round(tStallArea*10)/10, tBldArea?Math.round(tStallArea/tBldArea*1000)/10:0,
      tRent,
      tBldArea?Math.round(tRent/tBldArea):0,
      tStallArea?Math.round(tRent/tStallArea):0,
      tFilled?Math.round(tRent/tFilled):0,
      tA,tB,tC,tD,tEmpty]);
    GtCount+=tCount;GtFilled+=tFilled;GtRent+=tRent;
    GtA+=tA;GtB+=tB;GtC+=tC;GtD+=tD;GtEmpty+=tEmpty;
    if(!window.__GtBldArea)window.__GtBldArea=0; window.__GtBldArea+=tBldArea;
    if(!window.__GtStallArea)window.__GtStallArea=0; window.__GtStallArea+=tStallArea;
  }
  const GtBldArea=window.__GtBldArea||0; window.__GtBldArea=0;
  const GtStallArea=window.__GtStallArea||0; window.__GtStallArea=0;
  sumRows.push(['ВСЕ ЭТАЖИ','ВСЕГО','—',GtBldArea,GtCount,GtFilled,
    Math.round(GtStallArea*10)/10, GtBldArea?Math.round(GtStallArea/GtBldArea*1000)/10:0,
    GtRent,
    GtBldArea?Math.round(GtRent/GtBldArea):0,
    GtStallArea?Math.round(GtRent/GtStallArea):0,
    GtFilled?Math.round(GtRent/GtFilled):0,
    GtA,GtB,GtC,GtD,GtEmpty]);
  const ws3=XLSX.utils.aoa_to_sheet(sumRows);
  ws3['!cols']=[{wch:10},{wch:8},{wch:30},{wch:14},{wch:11},{wch:11},{wch:18},{wch:12},{wch:14},{wch:18},{wch:18},{wch:11},{wch:5},{wch:5},{wch:5},{wch:5},{wch:8}];
  ws3['!freeze']={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb, ws3, 'Сводка по корпусам');

  // ── Лист 4: Сводка по категориям ──
  const catRows=[['Категория','Прилавков','Площадь м²','Аренда ₽/мес','Доля площади %','Аренда ₽/м²']];
  const catGroups={};
  for(const fl of floors) for(const s of Object.values(fl.stalls)){
    if(!s.category)continue;
    (catGroups[s.category]=catGroups[s.category]||[]).push(s);
  }
  const catSorted=Object.entries(catGroups).sort((a,b)=>
    b[1].reduce((x,s)=>x+num(s.area),0)-a[1].reduce((x,s)=>x+num(s.area),0));
  const totalCatArea=catSorted.reduce((a,[_,l])=>a+l.reduce((x,s)=>x+num(s.area),0),0)||1;
  for(const [cat,list] of catSorted){
    const sumRent=list.reduce((a,s)=>a+num(s.rent),0);
    const sumArea=list.reduce((a,s)=>a+num(s.area),0);
    catRows.push([cat, list.length, Math.round(sumArea*10)/10, sumRent, Math.round(sumArea/totalCatArea*1000)/10, sumArea?Math.round(sumRent/sumArea):0]);
  }
  const ws4=XLSX.utils.aoa_to_sheet(catRows);
  ws4['!cols']=[{wch:32},{wch:11},{wch:13},{wch:14},{wch:14},{wch:13}];
  XLSX.utils.book_append_sheet(wb, ws4, 'Категории');

  // ── Лист: Зоны ──
  const zoneRows=[['Этаж','ID','Тип','Подпись','X','Y','Ширина','Высота']];
  for(const fl of floors){
    for(const p of (fl.passages||[])){
      const t=ZONE_TYPES[p.type||'main']||ZONE_TYPES.main;
      zoneRows.push([fl.name, p.id, t.label, p.label||'', num(p.x), num(p.y), num(p.w), num(p.h)]);
    }
  }
  // сводка по типам зон
  zoneRows.push([]);
  zoneRows.push(['СВОДКА ПО ТИПАМ ЗОН']);
  zoneRows.push(['Этаж','Тип зоны','Количество','Суммарная площадь по контуру (px²)']);
  for(const fl of floors){
    const byType={};
    for(const p of (fl.passages||[])){
      const tp=p.type||'main';
      (byType[tp]=byType[tp]||[]).push(p);
    }
    for(const [tp,list] of Object.entries(byType)){
      const t=ZONE_TYPES[tp]||ZONE_TYPES.main;
      const totalPx=list.reduce((a,p)=>a+num(p.w)*num(p.h),0);
      zoneRows.push([fl.name, t.label, list.length, totalPx]);
    }
  }
  const wsZ=XLSX.utils.aoa_to_sheet(zoneRows);
  wsZ['!cols']=[{wch:12},{wch:16},{wch:22},{wch:30},{wch:7},{wch:7},{wch:9},{wch:9}];
  XLSX.utils.book_append_sheet(wb, wsZ, 'Зоны');

  // ── Лист 5: Этажи (метаданные) ──
  const floorRows=[['Этаж','Прилавков','Проходов','Потоков','Заполнено','Сумма площадей м²','Общая аренда ₽/мес']];
  for(const fl of floors){
    const stallsArr=Object.values(fl.stalls);
    const filled=stallsArr.filter(s=>s.tenant||s.importance).length;
    const rent=stallsArr.reduce((a,s)=>a+num(s.rent),0);
    const ar=stallsArr.reduce((a,s)=>a+num(s.area),0);
    floorRows.push([fl.name, stallsArr.length, fl.passages.length, fl.flows.length, filled, Math.round(ar*10)/10, rent]);
  }
  const ws5=XLSX.utils.aoa_to_sheet(floorRows);
  ws5['!cols']=[{wch:16},{wch:11},{wch:11},{wch:10},{wch:11},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws5, 'Этажи');

  return wb;
}

// ── Копировать / Вставить / Дублировать выделенное ──
let clipboard=[];

// Цикл по типу формы выделенных прилавков:
//   rect → L(tr) → L(br) → L(bl) → L(tl) → rect
const L_CYCLE=['tr','br','bl','tl'];
function cycleLShape(){
  if(selectionSet.size===0){ flashStatus('Сначала выдели прилавок'); return; }
  let changed=0;
  for(const{type,id} of selectionItems()){
    if(type!=='stall') continue;
    const s=stalls[id]; if(!s) continue;
    if(s.shape!=='L' || !s.cut){
      s.shape='L';
      s.cut={cw:Math.max(4,Math.round(s.w/3)), ch:Math.max(4,Math.round(s.h/3)), corner:'tr'};
    } else {
      const idx=L_CYCLE.indexOf(s.cut.corner||'tr');
      if(idx>=L_CYCLE.length-1){
        // конец цикла — снимаем L
        delete s.shape; delete s.cut;
      } else {
        s.cut.corner=L_CYCLE[idx+1];
      }
    }
    changed++;
  }
  if(changed){ saveAll(); pushHistory(); buildSVG(); flashStatus(`Изменено: ${changed}`); }
}

function copySelection(){
  if(selectionSet.size===0) return;
  clipboard=[];
  for(const{type,id} of selectionItems()){
    if(type==='stall'){const s=stalls[id]; if(s) clipboard.push({type, data:JSON.parse(JSON.stringify(s))});}
    else if(type==='passage'){const ps=passages.find(p=>p.id===id); if(ps) clipboard.push({type, data:JSON.parse(JSON.stringify(ps))});}
    else if(type==='flow'){const f=flows.find(x=>x.id===id); if(f) clipboard.push({type, data:JSON.parse(JSON.stringify(f))});}
  }
  flashStatus(`Скопировано: ${clipboard.length}`);
}

function pasteClipboard(){
  if(clipboard.length===0){flashStatus('Буфер пуст'); return;}
  const dx=24, dy=24;
  selectionSet.clear();
  for(const item of clipboard){
    if(item.type==='stall'){
      const nd=JSON.parse(JSON.stringify(item.data));
      nd.x+=dx; nd.y+=dy;
      const bid=nd.building||'X';
      const id=getNextStallId(bid);
      stalls[id]=nd;
      selectionAdd('stall', id);
    } else if(item.type==='passage'){
      const nd=JSON.parse(JSON.stringify(item.data));
      nd.x+=dx; nd.y+=dy;
      nd.id='P'+Date.now()+Math.floor(Math.random()*1000);
      passages.push(nd);
      selectionAdd('passage', nd.id);
    } else if(item.type==='flow'){
      const nd=JSON.parse(JSON.stringify(item.data));
      nd.points=nd.points.map(p=>[p[0]+dx, p[1]+dy]);
      nd.id='F'+Date.now()+Math.floor(Math.random()*1000);
      flows.push(nd);
      selectionAdd('flow', nd.id);
    }
  }
  saveAll(); pushHistory();
  buildSVG(); updateStats(); renderFloorTabs();
  flashStatus(`Вставлено: ${clipboard.length}`);
}

function duplicateSelection(){
  if(selectionSet.size===0){flashStatus('Ничего не выделено'); return;}
  copySelection();
  pasteClipboard();
}

}

// API для PDF-экспорта из Electron main: физически переставляем SVG в body,
// прячем остальной DOM, ставим белый фон. После — возвращаем как было.
let _pdfRestore=null;
function enterPdfMode(){
  if(_pdfRestore) return true;
  const svg=document.getElementById('ymap');
  if(!svg){ console.warn('enterPdfMode: SVG не найден'); return false; }
  const sizer=document.getElementById('svg-sizer');
  // запоминаем место и стили
  _pdfRestore={
    svgParent: svg.parentNode,
    svgNext: svg.nextSibling,
    svgStyle: svg.getAttribute('style')||'',
    svgClass: svg.className && svg.className.baseVal!==undefined ? svg.className.baseVal : (svg.getAttribute('class')||''),
    bodyStyle: document.body.getAttribute('style')||'',
    bodyClass: document.body.className,
    htmlStyle: document.documentElement.getAttribute('style')||'',
    sizerTransform: sizer ? sizer.style.transform : null,
    hidden: [],
  };
  // снимаем зум-трансформ
  if(sizer) sizer.style.transform='none';
  // прячем всё в body
  for(const ch of Array.from(document.body.children)){
    _pdfRestore.hidden.push([ch, ch.style.display||'']);
    ch.style.display='none';
  }
  // перемещаем SVG напрямую в body и раскрываем его на весь лист
  document.body.appendChild(svg);
  svg.setAttribute('style','position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;background:#fff!important;filter:none!important;display:block!important;margin:0!important;padding:0!important;transform:none!important;');
  // viewBox остаётся 0 0 800 950, preserveAspectRatio по умолчанию meet
  if(!svg.getAttribute('preserveAspectRatio')) svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  document.body.setAttribute('style','margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important;');
  document.documentElement.setAttribute('style','margin:0!important;padding:0!important;background:#fff!important;');
  document.body.classList.add('pdf-mode');
  return true;
}
function exitPdfMode(){
  if(!_pdfRestore) return true;
  const r=_pdfRestore;
  const svg=document.getElementById('ymap');
  if(svg){
    svg.setAttribute('style', r.svgStyle);
    if(r.svgParent){
      if(r.svgNext) r.svgParent.insertBefore(svg, r.svgNext);
      else r.svgParent.appendChild(svg);
    }
  }
  // показываем обратно
  for(const [el, prev] of r.hidden){ el.style.display=prev; }
  const sizer=document.getElementById('svg-sizer');
  if(sizer && r.sizerTransform!==null) sizer.style.transform=r.sizerTransform;
  document.body.setAttribute('style', r.bodyStyle);
  document.body.className = r.bodyClass;
  document.documentElement.setAttribute('style', r.htmlStyle);
  document.body.classList.remove('pdf-mode');
  _pdfRestore=null;
  // форсим перерисовку
  if(typeof buildSVG==='function') try{ buildSVG(); }catch(e){}
  return true;
}

function onConfigChange(e){
  const bid=e.target.dataset.bid;
  const field=e.target.dataset.field;
  const b=BUILDINGS.find(x=>x.id===bid);
  if(!b)return;
  if(field==='path'){
    const v=e.target.value.trim();
    if(parsePath(v).length<3) return;
    b.path=v;
  } else if(field==='label'){
    b.label=e.target.value;
  } else if(field==='fillColor'){
    const v=e.target.value.trim();
    if(!v){ delete b.fillColor; }
    else if(/^#[0-9a-fA-F]{3,8}$/.test(v) || v.startsWith('rgb') || v.startsWith('hsl')) b.fillColor=v;
    else return;
    // синхронизация color/text inputs друг с другом
    const partnerSel = e.target.type==='color'
      ? `input[type="text"][data-bid="${bid}"][data-field="fillColor"]`
      : `input[type="color"][data-bid="${bid}"][data-field="fillColor"]`;
    const partner = document.querySelector(partnerSel);
    if(partner && partner.value !== e.target.value){
      partner.value = b.fillColor || (e.target.type==='color' ? '#f0f4f9' : '');
    }
  } else {
    const v=parseFloat(e.target.value);
    if(isNaN(v))return;
    if(field==='rows') b.rows=Math.max(1,Math.round(v));
    else if(field==='cols') b.cols=Math.max(1,Math.round(v));
    else if(field==='gapX') b.gapX=v;
    else if(field==='gapY') b.gapY=v;
    else if(field==='ax') b.stallArea.x=v;
    else if(field==='ay') b.stallArea.y=v;
    else if(field==='aw') b.stallArea.w=v;
    else if(field==='ah') b.stallArea.h=v;
    else if(field==='area') b.area=Math.max(0,v);
    const btn=document.querySelector(`button[onclick="regenerateGridFor('${b.id}')"]`);
    if(btn) btn.textContent=`🎲 Перегенерировать сетку (${b.rows}×${b.cols} = ${b.rows*b.cols} мест)`;
  }
  saveAll();
  buildSVG();
}

function regenerateGridFor(bid){

  if(cnt>0 && !confirm(`⚠️ Удалить ВСЕ ${cnt} прилавков в ${bid} (включая нестандартные — длинные, повёрнутые, угловые, переставленные вручную) и создать заново сетку ${b.rows}×${b.cols} = ${b.rows*b.cols} мест на ${floors[currentFloorIdx].name}?\n\nДанные арендаторов (имя, категория, важность) тоже будут потеряны.\n\nЕсли хочешь только частично перенастроить — отмени и правь существующие прилавки вручную.`)) return;

function renameStallInEdit(oldId){
  if(!oldId || !stalls[oldId]) return;
  if(modalOpen) return;
  myPrompt(`Новый номер прилавка (текущий: ${oldId}):`, oldId).then(v=>{
    if(v===null) return;
    const trimmed=String(v).trim();
    if(!trimmed || trimmed===oldId) return;
    if(stalls[trimmed]){alert(`ID "${trimmed}" уже используется.`); return;}
    stalls[trimmed]=stalls[oldId];
    delete stalls[oldId];
    if(isSelected('stall',oldId)){selectionRemove('stall',oldId); selectionAdd('stall',trimmed);}
    saveAll(); pushHistory();
    buildSVG(); updateStats();
  });
}

function alignSelection(side){
  if(selectionSet.size<2) return;
  const bb=getGroupBBox(); if(!bb) return;
  let changed=false;
  for(const {type,id} of selectionItems()){
    if(type==='stall' || type==='passage'){
      const t = (type==='stall') ? stalls[id] : passages.find(p=>p.id===id);
      if(!t) continue;
      const before={x:t.x,y:t.y};
      if(side==='left')   t.x = Math.round(bb.minX);
      if(side==='right')  t.x = Math.round(bb.maxX - t.w);
      if(side==='top')    t.y = Math.round(bb.minY);
      if(side==='bottom') t.y = Math.round(bb.maxY - t.h);
      if(before.x!==t.x || before.y!==t.y) changed=true;
    } else if(type==='flow'){
      const f=flows.find(x=>x.id===id);
      if(!f || !f.points.length) continue;
      const xs=f.points.map(p=>p[0]), ys=f.points.map(p=>p[1]);
      const minX=Math.min(...xs), maxX=Math.max(...xs);
      const minY=Math.min(...ys), maxY=Math.max(...ys);
      let dx=0, dy=0;
      if(side==='left')   dx = Math.round(bb.minX - minX);
      if(side==='right')  dx = Math.round(bb.maxX - maxX);
      if(side==='top')    dy = Math.round(bb.minY - minY);
      if(side==='bottom') dy = Math.round(bb.maxY - maxY);
      if(dx||dy){
        f.points = f.points.map(p=>[p[0]+dx, p[1]+dy]);
        changed=true;
      }
    }
  }
  if(changed){
    saveAll(); pushHistory();
    buildSVG(); updateStats();
  }
}

// Цикл П-формы: rect → П-bottom → П-top → П-left → П-right → rect
const P_CYCLE=['bottom','top','left','right'];
function cyclePShape(){
  if(selectionSet.size===0){flashStatus('Сначала выдели прилавок'); return;}
  let changed=0;
  for(const {type,id} of selectionItems()){
    if(type!=='stall') continue;
    const s=stalls[id]; if(!s) continue;
    if(s.shape!=='P' || !s.cut){
      // если был L — сначала снимем его
      if(s.shape==='L'){delete s.shape; delete s.cut;}
      s.shape='P';
      s.cut={cw:Math.max(4,Math.round(s.w/2)), ch:Math.max(4,Math.round(s.h/2)), side:'bottom'};
    } else {
      const idx=P_CYCLE.indexOf(s.cut.side||'bottom');
      if(idx>=P_CYCLE.length-1){ delete s.shape; delete s.cut; }
      else { s.cut.side=P_CYCLE[idx+1]; }
    }
    changed++;
  }
  if(changed){ saveAll(); pushHistory(); buildSVG(); flashStatus(`Изменено: ${changed}`); }
}

// цикл ориентации номера для выделенных прилавков: undefined (наследует от здания) → 'h' → 'v' → undefined
function cycleStallLabelOrient(){
  if(selectionSet.size===0){flashStatus('Сначала выдели прилавок'); return;}
  let changed=0;
  for(const {type,id} of selectionItems()){
    if(type!=='stall') continue;
    const s=stalls[id]; if(!s) continue;
    const cur=s.labelOrient;
    if(!cur) s.labelOrient='h';
    else if(cur==='h') s.labelOrient='v';
    else delete s.labelOrient;
    changed++;
  }
  if(changed){ saveAll(); pushHistory(); buildSVG(); flashStatus(`Повёрнуто: ${changed}`); }
}

// Прилавки, у которых building=bid, но центр НЕ внутри полигона этого корпуса:
// определяем в какой полигон они реально попадают и переназначаем;
// если ни в один — спрашиваем удалить или оставить как «X»
function cleanupOrphans(bid){
  const b=BUILDINGS.find(x=>x.id===bid);
  if(!b) return;
  const pts=parsePath(b.path);
  const orphans=[];
  for(const [id,s] of Object.entries(stalls)){
    if(s.building!==bid) continue;
    if(!pointInPolygon(s.x+s.w/2, s.y+s.h/2, pts)) orphans.push([id,s]);
  }
  if(orphans.length===0){flashStatus('Осиротевших нет'); return;}
  // считаем новые привязки
  let reassigned=0, homeless=0;
  const changes=[];
  for(const [id,s] of orphans){
    const realBid=whichBuilding(s.x+s.w/2, s.y+s.h/2);
    if(realBid && realBid!==bid){
      changes.push({id, from:bid, to:realBid});
      reassigned++;
    } else if(!realBid){
      changes.push({id, from:bid, to:null});
      homeless++;
    }
  }
  if(!confirm(`Найдено ${orphans.length} прилавков в ${bid} вне его контура.\n\nБудет переназначено в другие корпусы: ${reassigned}\nОстанется бесхозными (вне всех контуров): ${homeless} — можно удалить или оставить.\n\nПродолжить?`)) return;
  for(const ch of changes){
    if(ch.to) stalls[ch.id].building=ch.to;
    else if(confirm(`Прилавок ${ch.id} не попадает ни в один контур. Удалить его?`)) delete stalls[ch.id];
  }
  saveAll(); pushHistory();
  buildSVG(); updateStats(); renderEditPanel();
  flashStatus(`Переназначено: ${reassigned}, удалено/оставлено: ${homeless}`);
}

function toggleLabelOrient(bid){
  const b=BUILDINGS.find(x=>x.id===bid);
  if(!b) return;
  b.labelOrient = (b.labelOrient==='v') ? 'h' : 'v';
  saveAll(); pushHistory();

function pickRenumberDir(){
  return new Promise(resolve=>{
    if(modalOpen){resolve(null);return;}
    modalOpen=true;
    const ov=document.getElementById('renum-modal');
    const sel=document.getElementById('renum-dir');
    const ok=document.getElementById('renum-ok');
    const cancel=document.getElementById('renum-cancel');
    sel.value=localStorage.getItem('renum-dir')||'bt-lr';
    if(!['bt-lr','tb-lr'].includes(sel.value)) sel.value='bt-lr';
    ov.classList.add('show');
    const close=v=>{modalOpen=false; ov.classList.remove('show'); ok.onclick=null; cancel.onclick=null; resolve(v);};
    ok.onclick=()=>{localStorage.setItem('renum-dir',sel.value); close(sel.value);};
    cancel.onclick=()=>close(null);
  });
}

function sortByDirection(entries, dir){
  // entries: [{id,s}] — вычисляем bbox-центр прилавка
  const items=entries.map(e=>({...e, cx:e.s.x+e.s.w/2, cy:e.s.y+e.s.h/2}));
  // снеппинг по строкам/колонкам: толерантность ~15px
  const TOL=15;
  const primaryRow = (a,b)=>{
    if(Math.abs(a.cy-b.cy)<=TOL) return 0;
    return a.cy-b.cy;
  };
  const primaryCol = (a,b)=>{
    if(Math.abs(a.cx-b.cx)<=TOL) return 0;
    return a.cx-b.cx;
  };
  const cmpY=(s)=>(a,b)=>s*(a.cy-b.cy);
  const cmpX=(s)=>(a,b)=>s*(a.cx-b.cx);
  // dir: <primary axis>-<secondary axis>
  // tb/bt — primary по Y (строки), затем по X
  // lr/rl — primary по X (колонки), затем по Y
  let cmp;
  if(dir==='tb-lr') cmp=(a,b)=>primaryRow(a,b)||(a.cx-b.cx);
  else if(dir==='tb-rl') cmp=(a,b)=>primaryRow(a,b)||(b.cx-a.cx);
  else if(dir==='bt-lr') cmp=(a,b)=>(-primaryRow(a,b))||(a.cx-b.cx);
  else if(dir==='bt-rl') cmp=(a,b)=>(-primaryRow(a,b))||(b.cx-a.cx);
  else if(dir==='lr-tb') cmp=(a,b)=>primaryCol(a,b)||(a.cy-b.cy);
  else if(dir==='lr-bt') cmp=(a,b)=>primaryCol(a,b)||(b.cy-a.cy);
  else if(dir==='rl-tb') cmp=(a,b)=>(-primaryCol(a,b))||(a.cy-b.cy);
  else /*rl-bt*/        cmp=(a,b)=>(-primaryCol(a,b))||(b.cy-a.cy);
  return items.sort(cmp);
}

const RENUM_DIR_LABEL={
  'bt-lr':'снизу вверх',
  'tb-lr':'слева направо',
};

async function renumberBuilding(bid){
  const entries=Object.entries(stalls).filter(([_,s])=>s.building===bid);
  if(entries.length===0){alert(`В ${bid} нет прилавков на ${floors[currentFloorIdx].name}.`);return;}
  const dir=await pickRenumberDir();
  if(dir===null) return;
  const prefix=await myPrompt(`Префикс для нумерации в ${bid}:`, bid);
  if(prefix===null) return;
  const startStr=await myPrompt('Начать с номера:', '1', {type:'number'});
  if(startStr===null) return;
  const start=parseInt(startStr,10);
  if(isNaN(start)||start<0){alert('Некорректный номер.');return;}
  const padStr=await myPrompt('Сколько знаков в номере:', '3', {type:'number'});
  if(padStr===null) return;
  const pad=Math.max(1, parseInt(padStr,10)||3);

  const sorted=sortByDirection(entries.map(([id,s])=>({id,s})), dir);
  const newIds=sorted.map((_,i)=>`${prefix.trim()||bid}-${String(start+i).padStart(pad,'0')}`);
  // проверка: реально ли что-то меняется
  const noChange = sorted.every((item,i)=>item.id===newIds[i]);
  if(noChange){
    alert(`Прилавки в ${bid} уже пронумерованы в порядке «${RENUM_DIR_LABEL[dir]||dir}». Ничего не меняю.`);
    return;
  }
  const otherIds=new Set(Object.keys(stalls).filter(id=>!entries.some(([eid])=>eid===id)));
  for(const nid of newIds){
    if(otherIds.has(nid)){alert(`Коллизия: ID "${nid}" уже используется.`);return;}
  }
  for(const {id} of sorted) delete stalls[id];
  sorted.forEach((item,i)=>{stalls[newIds[i]]={...item.s,building:bid};});
  saveAll(); pushHistory();
  buildSVG(); updateStats(); renderEditPanel(); renderFloorTabs();
  alert(`Перенумеровано ${entries.length} прилавков (${RENUM_DIR_LABEL[dir]||dir}): ${newIds[0]} … ${newIds[newIds.length-1]}`);
}

function getNextBuildingId(){
  const used=new Set(BUILDINGS.map(b=>b.id));
  for(let i=1;i<200;i++){const id='C'+i; if(!used.has(id)) return id;}
  return 'B'+Date.now();
}

function addBuilding(){
  const id=getNextBuildingId();
  // прямоугольник в свободной зоне (центр карты)
  const cx=400, cy=720;
  const w=200, h=130;
  const x0=cx-w/2, y0=cy-h/2, x1=cx+w/2, y1=cy+h/2;
  const newBld={
    id,
    label:`${id} — Новый корпус`,
    sub:'',
    path:`M ${x0} ${y0} L ${x1} ${y0} L ${x1} ${y1} L ${x0} ${y1} Z`,
    labelXY:[x0+10, y0+20],
    subXY:[x0+10, y0+34],
    stallArea:{x:x0+10, y:y0+45, w:w-20, h:h-55},
    rows:3, cols:4, gapX:3, gapY:3, area:0,
  };
  BUILDINGS.push(newBld);
  saveAll(); pushHistory();
  buildSVG(); renderEditPanel(); renderFloorTabs();
}

function deleteBuilding(bid){
  const stallCount=Object.values(stalls).filter(s=>s.building===bid).length;
  const msg=stallCount>0
    ? `Удалить корпус ${bid} и все ${stallCount} прилавков в нём? Данные арендаторов будут потеряны.`
    : `Удалить корпус ${bid}?`;
  if(!confirm(msg)) return;
  const idx=BUILDINGS.findIndex(b=>b.id===bid);
  if(idx<0) return;
  BUILDINGS.splice(idx,1);
  for(const id of Object.keys(stalls)){
    if(stalls[id].building===bid) delete stalls[id];
  }
  saveAll(); pushHistory();
  buildSVG(); updateStats(); renderEditPanel(); renderFloorTabs();
}

function resetConfig(){
  if(!confirm(`Сбросить настройки зданий на «${floors[currentFloorIdx].name}» к исходным? (прилавки не трогаем)`)) return;
  const fresh=JSON.parse(JSON.stringify(DEFAULT_BUILDINGS));
  BUILDINGS.length=0;
  fresh.forEach(b=>BUILDINGS.push(b));
  saveAll(); pushHistory();
  renderEditPanel(); buildSVG();
}

// ═══════════════ ИСТОРИЯ ═══════════════
function snapshot(){
  return JSON.stringify({floors, currentFloorIdx});
}
function pushHistory(){
  history.length=historyIdx+1;
  history.push(snapshot());
  if(history.length>HISTORY_MAX) history.shift();
  historyIdx=history.length-1;
  updateUndoBtns();
}
function restoreSnapshot(snapStr){
  const s=JSON.parse(snapStr);
  // полная замена floors
  floors.length=0;
  s.floors.forEach(f=>floors.push(f));
  currentFloorIdx=Math.max(0,Math.min(s.currentFloorIdx, floors.length-1));
  syncAliases();
  saveAll();
  if(selectedId && !stalls[selectedId]) closeSidebar();
  // вычистить из выделения объекты, которые больше не существуют
  for(const k of [...selectionSet]){
    const i=k.indexOf(':'); const type=k.substr(0,i); const id=k.substr(i+1);
    const exists = type==='stall' ? !!stalls[id]
      : type==='passage' ? passages.some(p=>p.id===id)
      : type==='flow' ? flows.some(x=>x.id===id) : false;
    if(!exists) selectionSet.delete(k);
  }
  renderFloorTabs();
  if(editMode) renderEditPanel();
  buildSVG();
  updateStats();
  updateUndoBtns();
}
function undo(){if(historyIdx<=0)return;historyIdx--;restoreSnapshot(history[historyIdx]);}
function redo(){if(historyIdx>=history.length-1)return;historyIdx++;restoreSnapshot(history[historyIdx]);}
function updateUndoBtns(){
  const u=document.getElementById('btn-undo'), r=document.getElementById('btn-redo');
  if(u) u.disabled=historyIdx<=0;
  if(r) r.disabled=historyIdx>=history.length-1;
}

// ═══════════════ СОБЫТИЯ ═══════════════
function bindEvents(){
  const svg=document.getElementById('ymap');
  svg.addEventListener('mousedown',onSvgMouseDown);
  document.addEventListener('mousemove',onDocMouseMove);
  document.addEventListener('mouseup',onDocMouseUp);
  svg.addEventListener('contextmenu',onSvgContextMenu);
  svg.addEventListener('dblclick',onSvgDblClick);

  // при изменении размера окна — рецентровать карту
  window.addEventListener('resize', ()=>{ clearTimeout(window.__resizeTimer); window.__resizeTimer=setTimeout(centerView, 100); });

  // зум колесом с Ctrl/Cmd
  const wrap=document.querySelector('.map-wrap');
  wrap.addEventListener('wheel', e=>{
    if(!(e.ctrlKey||e.metaKey)) return;
    e.preventDefault();
    const rect=wrap.getBoundingClientRect();
    const localX=e.clientX-rect.left, localY=e.clientY-rect.top;
    const worldX=(localX+wrap.scrollLeft)/zoom;
    const worldY=(localY+wrap.scrollTop)/zoom;
    const factor=e.deltaY<0?1.1:1/1.1;
    setZoom(zoom*factor, {worldX, worldY, localX, localY});
  }, {passive:false});

  // хоткеи копирования/вставки/дублирования
  document.addEventListener('keydown', e=>{
    if(!(e.metaKey||e.ctrlKey)) return;
    const ae=document.activeElement;
    if(ae && /INPUT|TEXTAREA|SELECT/.test(ae.tagName)) return;
    const k=(e.key||'').toLowerCase();
    if(k==='c'||k==='с'){
      if(selectionSet.size>0){e.preventDefault(); copySelection();}
    } else if(k==='v'||k==='м'){
      if(clipboard.length>0){e.preventDefault(); pasteClipboard();}
    } else if(k==='d'||k==='в'){
      if(selectionSet.size>0){e.preventDefault(); duplicateSelection();}
    }
  });

  // хоткеи файла (для веб-версии; в Electron то же делает меню)
  document.addEventListener('keydown', e=>{
    if(!(e.metaKey||e.ctrlKey)) return;
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    const k=(e.key||'').toLowerCase();
    if(k==='o'||k==='щ'){e.preventDefault(); openFromFile();}
    else if(k==='s'||k==='ы'){e.preventDefault(); saveToFile(e.shiftKey);}
    else if(k==='e'||k==='у'){e.preventDefault(); exportXLSX();}
  });

  // хоткеи зума + стрелки для пан-перемещения
  document.addEventListener('keydown', e=>{
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    if(e.metaKey||e.ctrlKey){
      if(e.key==='='||e.key==='+'){e.preventDefault(); zoomIn(); return;}
      if(e.key==='-'){e.preventDefault(); zoomOut(); return;}
      if(e.key==='0'){e.preventDefault(); zoomReset(); return;}
    }
    // стрелки — двигают выделение, если что-то выделено в режиме редактирования; иначе панорамят карту
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
      if(editMode && currentTool==='pointer' && selectionSet.size>0){
        e.preventDefault();
        const d=e.shiftKey?10:1;
        const dx = e.key==='ArrowLeft'?-d : e.key==='ArrowRight'?d : 0;
        const dy = e.key==='ArrowUp'?-d : e.key==='ArrowDown'?d : 0;
        for(const {type,id} of selectionItems()){
          if(type==='stall'){const s=stalls[id]; if(s){s.x+=dx; s.y+=dy;}}
          else if(type==='passage'){const ps=passages.find(p=>p.id===id); if(ps){ps.x+=dx; ps.y+=dy;}}
          else if(type==='flow'){const f=flows.find(x=>x.id===id); if(f){f.points=f.points.map(p=>[p[0]+dx, p[1]+dy]);}}
        }
        saveAll(); pushHistory(); buildSVG();
        return;
      }
      e.preventDefault();
      const step=e.shiftKey?200:60;
      if(e.key==='ArrowLeft') wrap.scrollLeft-=step;
      else if(e.key==='ArrowRight') wrap.scrollLeft+=step;
      else if(e.key==='ArrowUp') wrap.scrollTop-=step;
      else if(e.key==='ArrowDown') wrap.scrollTop+=step;
    }
  });
  svg.addEventListener('click',onStallClick);
  svg.addEventListener('mouseover',e=>{
    const kind=e.target.dataset && e.target.dataset.kind;
    if((kind==='stall'||kind==='flow') && (!editMode || currentTool==='pointer')) onStallEnter(e);
  });
  svg.addEventListener('mouseout',e=>{onStallLeave();});
  svg.addEventListener('mousemove',e=>{
    if(document.getElementById('tooltip').style.display==='block') moveTooltip(e);
  });
}

bindEvents();
updateStats();
