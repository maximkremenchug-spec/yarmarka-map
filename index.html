<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  /* ── ТЕМА: палитры ── */
  :root{
    --bg-main:#0d1b2a;        --bg-panel:#111f33;       --bg-panel-2:#0e1f33;
    --bg-canvas:#08111e;      --bg-road:#0a1628;        --bg-plot:#0c1d30;
    --bld-bg:#142a47;
    --border:#1e3a5f;         --border-2:#2a5a8a;       --border-dim:#1a3a5f;
    --text-main:#e0e6f0;      --text-dim:#8ab0cc;       --text-dimmer:#7a9ab5;
    --text-faint:#5a7a98;     --text-faintest:#3a6080;
    --tt-bg:rgba(10,22,40,.97);
    --watermark:rgba(255,255,255,.15);
    --stall-empty:#1e3a5f;    --stall-empty-stroke:#2a4a6b;
    --shadow:rgba(0,0,0,.6);
    --hover-bg:#1a3050;       --hover-bg-strong:#24405f;
    --on-accent:#ffffff;
  }
  [data-theme="light"]{
    --bg-main:#f5f7fa;        --bg-panel:#ffffff;       --bg-panel-2:#fbfcfd;
    --bg-canvas:#eef2f7;      --bg-road:#e6ecf3;        --bg-plot:#f4f7fb;
    --bld-bg:#e8eef5;
    --border:#d6dce3;         --border-2:#b9c3cf;       --border-dim:#dde3eb;
    --text-main:#1a2538;      --text-dim:#3d4d65;       --text-dimmer:#5a6b82;
    --text-faint:#8a99ad;     --text-faintest:#b0bccc;
    --tt-bg:rgba(255,255,255,.98);
    --watermark:rgba(20,40,70,.12);
    --stall-empty:#cfd8e3;    --stall-empty-stroke:#b9c3cf;
    --shadow:rgba(100,120,160,.25);
    --hover-bg:#eaeff5;       --hover-bg-strong:#dde3eb;
    --on-accent:#ffffff;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg-main);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  header h1{font-size:14px;font-weight:700;color:#e94560;white-space:nowrap}
  .header-stats{display:flex;gap:12px;font-size:12px;color:var(--text-dim);margin-left:auto}
  .header-stats .val{font-weight:700;color:var(--text-main)}
  .stat-A{color:#2ecc71!important}.stat-B{color:#3498db!important}.stat-C{color:#e67e22!important}.stat-D{color:#e74c3c!important}

  .toolbar{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 20px;height:40px;display:flex;align-items:center;gap:10px;flex-shrink:0;font-size:11px}
  .legend{display:flex;gap:14px}
  .legend-item{display:flex;align-items:center;gap:5px;color:var(--text-dimmer)}
  .legend-dot{width:12px;height:9px;border-radius:2px}
  .spacer{flex:1}
  .btn{padding:5px 12px;border:1px solid var(--border);border-radius:5px;font-size:11px;cursor:pointer;background:var(--bg-panel);color:var(--text-dim);transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--hover-bg);color:var(--on-accent)}
  .btn-danger{border-color:#4a1010;color:#e74c3c}
  .btn-danger:hover{background:#4a1010}
  .btn-success{border-color:#0d2e1a;color:#2ecc71}
  .btn-success:hover{background:#0d2e1a}
  .btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
  .btn-icon{padding:5px 9px;font-size:14px;line-height:1}

  /* dropdown */
  .dropdown{position:relative;display:inline-block}
  .dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;min-width:220px;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:4px;display:none;z-index:5000;box-shadow:0 6px 20px var(--shadow)}
  .dropdown.open .dropdown-menu{display:block}
  .dropdown-menu button{display:block;width:100%;text-align:left;background:transparent;border:none;color:var(--text-dim);padding:7px 12px;font-size:12px;cursor:pointer;border-radius:4px;white-space:nowrap}
  .dropdown-menu button:hover{background:var(--hover-bg);color:var(--text-main)}
  .dropdown-menu hr{border:none;border-top:1px solid var(--border);margin:4px 0}

  .progress-bar{height:2px;background:var(--border);flex-shrink:0}
  .progress-fill{height:100%;background:linear-gradient(90deg,#e94560,#3498db);transition:width .4s}

  /* floor tabs */
  .floor-tabs{background:transparent;border-bottom:none;padding:0;display:flex;align-items:center;gap:5px;flex-shrink:0;overflow-x:auto;min-height:32px}
  .floor-tab{padding:5px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:var(--bg-panel);color:var(--text-dim);display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .12s}
  .floor-tab:hover{background:var(--hover-bg);color:var(--on-accent)}
  .floor-tab.active{background:#e94560;color:var(--on-accent);border-color:#e94560}
  .floor-tab .ft-cnt{font-size:10px;opacity:.7}
  .floor-tab .ft-act{width:18px;height:18px;border:none;background:rgba(0,0,0,.25);color:var(--on-accent);border-radius:3px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
  .floor-tab.active .ft-act{display:flex}
  .floor-tab .ft-act:hover{background:rgba(0,0,0,.55)}
  .floor-add{padding:5px 12px;border:1px dashed #2a5a80;border-radius:6px;background:transparent;color:var(--text-faint);font-size:12px;cursor:pointer}
  .floor-add:hover{color:var(--on-accent);border-color:var(--on-accent)}

  .main{flex:1;display:flex;overflow:hidden;position:relative}
  .map-wrap{flex:1;overflow:auto;background:var(--bg-road);display:flex;align-items:safe center;justify-content:safe center}
  .pan-area{padding:500px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .svg-sizer{position:relative;width:960px;height:1090px;flex-shrink:0}
  svg.ymap{position:absolute;top:0;left:0;width:960px;height:1090px;transform-origin:0 0}
  svg.ymap{display:block;filter:drop-shadow(0 6px 30px rgba(0,0,0,.6));user-select:none}

  .building-outline{fill:var(--bld-bg);stroke:#e94560;stroke-width:2.5;stroke-linejoin:round}
  .building-label{font-size:13px;font-weight:800;fill:#e94560;font-family:sans-serif;pointer-events:none}
  .building-sub{font-size:10px;fill:#7a9ab5;font-family:sans-serif;pointer-events:none}

  .stall-rect{cursor:pointer;transition:opacity .12s,filter .12s}
  .stall-rect:hover{opacity:.85;filter:brightness(1.3)}
  .stall-rect.form-selected{filter:brightness(1.5);stroke-width:2!important}
  .stall-rect.edit-selected{filter:brightness(1.45);stroke:#ffe600!important;stroke-width:1!important}

  .passage-rect{stroke-width:1;cursor:pointer}
  .passage-rect.edit-selected{stroke:#ffe600!important;stroke-width:2.5!important}
  .passage-label{font-size:10px;font-style:italic;font-family:sans-serif;pointer-events:none;text-anchor:middle;font-weight:500}

  .flow-line{cursor:pointer;fill:none;transition:opacity .15s}
  .flow-line:hover{opacity:1!important;filter:brightness(1.2)}
  .flow-line.edit-selected{filter:drop-shadow(0 0 5px #ffe600)}
  .flow-label{font-size:10px;font-weight:500;fill:var(--text-main);stroke:var(--bg-canvas);stroke-width:2.5;paint-order:stroke fill;pointer-events:none;letter-spacing:.3px}

  /* CSS-классы для theme-aware SVG элементов (var() в атрибутах ненадёжен) */
  .sv-bg-canvas{fill:var(--bg-canvas)}
  .sv-bg-road{fill:var(--bg-road)}
  .sv-bg-plot{fill:var(--bg-plot)}
  .sv-stroke-dim{stroke:var(--border-dim)}
  .sv-watermark{fill:var(--watermark)}
  .sv-compass-bg{fill:var(--bg-road);stroke:var(--border-2)}
  .sv-text-faint{fill:var(--text-faint)}
  .sv-stall-empty{fill:var(--stall-empty);stroke:var(--stall-empty-stroke)}

  .vertex-handle{fill:#ffe600;stroke:#000;stroke-width:1.5;cursor:move;transition:r .1s}
  .vertex-handle:hover{fill:#fff;r:8}
  .resize-handle{fill:#ffe600;stroke:#000;stroke-width:1;cursor:nwse-resize}
  .resize-handle:hover{fill:#fff}

  /* tool cursors */
  body.editing.tool-pointer svg.ymap{cursor:default}
  body.editing.tool-stall svg.ymap{cursor:copy}
  body.editing.tool-passage svg.ymap{cursor:crosshair}
  body.editing.tool-flow svg.ymap{cursor:crosshair}
  body.editing.tool-delete svg.ymap{cursor:not-allowed}
  body.editing.tool-annot svg.ymap{cursor:text}
  .annot-text{cursor:move;}
  body.editing.tool-vertex svg.ymap{cursor:default}

  body.editing.tool-stall .stall-rect,body.editing.tool-passage .stall-rect,body.editing.tool-flow .stall-rect{pointer-events:none;opacity:.55}
  body.editing.tool-passage .passage-rect,body.editing.tool-flow .passage-rect{pointer-events:none;opacity:.55}

  /* tool palette — флекс-колонка слева */
  .tool-palette{width:0;overflow:hidden;background:var(--bg-panel-2);border-right:1px solid var(--border);flex-shrink:0;transition:width .2s ease;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0}
  body.editing .tool-palette{width:64px;padding:8px 6px}
  .tool-btn{width:48px;height:48px;border:1px solid var(--border);background:var(--bg-road);color:var(--text-dim);border-radius:7px;cursor:pointer;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .12s}
  .tool-btn:hover{background:var(--hover-bg);color:var(--on-accent)}
  .tool-btn.active{background:#e94560;color:var(--on-accent);border-color:#e94560}
  .tool-btn .lbl{font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .tool-divider{height:1px;background:var(--border);margin:2px 0}

  /* sidebar */
  .sidebar{width:0;overflow:hidden;background:var(--bg-panel);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s ease;flex-shrink:0}
  .sidebar.open{width:340px}
  .sb-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .sb-id{font-size:20px;font-weight:800;color:#e94560}
  .sb-bld{font-size:11px;color:var(--text-faint);margin-top:2px}
  .sb-close{width:28px;height:28px;border-radius:6px;background:var(--hover-bg);border:none;color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sb-close:hover{background:var(--hover-bg-strong);color:var(--on-accent)}
  .sb-body{flex:1;overflow-y:auto;padding:16px}

  .fg{margin-bottom:14px}
  .lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);margin-bottom:5px;font-weight:600}
  .inp{width:100%;background:var(--bg-road);border:1px solid var(--border);border-radius:6px;color:var(--text-main);padding:8px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
  .inp:focus{border-color:#3a7abd}
  textarea.inp{resize:vertical;min-height:72px}
  select.inp{cursor:pointer}
  select.inp option{background:var(--bg-road)}

  .imp-group{display:flex;gap:6px}
  .imp-btn{flex:1;padding:9px 4px;border-radius:6px;border:2px solid transparent;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s;opacity:.32}
  .imp-btn:hover,.imp-btn.active{opacity:1}
  .imp-A{background:#0d2e1a;color:#2ecc71;border-color:#2ecc71}
  .imp-B{background:#0d1e34;color:#3498db;border-color:#3498db}
  .imp-C{background:#2e1c08;color:#e67e22;border-color:#e67e22}
  .imp-D{background:#2e0d0d;color:#e74c3c;border-color:#e74c3c}

  .sb-footer{padding:12px 16px;border-top:1px solid #1e3a5f;display:flex;gap:8px;flex-shrink:0}
  .btn-save{flex:1;padding:10px;background:#e94560;color:var(--on-accent);border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
  .btn-save:hover{background:#c0392b}
  .btn-reset{padding:10px 14px;background:var(--bg-road);color:var(--text-faint);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer}
  .btn-reset:hover{color:#e74c3c;border-color:#e74c3c}

  /* edit-panel — флекс-колонка справа */
  .edit-panel{width:0;overflow:hidden;background:var(--bg-panel);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s ease;flex-shrink:0}
  .edit-panel.open{width:360px}
  .ep-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg-panel-2)}
  .ep-title{font-size:13px;font-weight:700;color:#e94560}
  .ep-body{flex:1;overflow-y:auto;padding:8px 12px}
  .ep-bld{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
  .ep-bld-head{padding:9px 12px;background:var(--bld-bg);font-size:12px;font-weight:700;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:4px}
  .ep-bld-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;order:2;margin-left:2px}
  .ep-bld-edit{background:transparent;border:none;color:var(--text-faint);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;order:1}
  .ep-bld-edit:hover{background:var(--hover-bg);color:#e94560}
  .ep-bld-head .ep-count{order:3;min-width:120px;text-align:right;flex-shrink:0}
  .ep-bld-head .ep-count{color:#e94560;font-weight:800}
  .ep-bld-body{padding:10px 12px;display:none}
  .ep-bld.open .ep-bld-body{display:block}
  .ep-row{display:flex;gap:8px;margin-bottom:8px}
  .ep-col{flex:1}
  .ep-col label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);margin-bottom:3px;font-weight:600}
  .ep-col input{width:100%;background:var(--bg-road);border:1px solid var(--border);border-radius:5px;color:var(--text-main);padding:5px 7px;font-size:12px;outline:none;font-family:inherit}
  .ep-col input:focus{border-color:#3a7abd}
  .ep-section{font-size:9px;color:var(--text-faintest);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin:10px 0 5px}
  .ep-footer{padding:10px 12px;border-top:1px solid #1e3a5f;display:flex;gap:6px;flex-shrink:0;background:var(--bg-panel-2)}
  .ep-footer .btn{flex:1}
  .ep-hint{font-size:10px;color:var(--text-dimmer);line-height:1.5;padding:8px 10px;background:var(--bg-road);border-radius:6px;margin-bottom:10px}
  .ep-hint b{color:#ffe600}

  /* tooltip */
  #tooltip{position:fixed;display:none;background:var(--tt-bg);border:1px solid var(--border-2);border-radius:8px;padding:9px 13px;font-size:12px;pointer-events:none;z-index:9999;max-width:230px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
  .tt-id{font-weight:800;color:#e94560;font-size:13px}
  .tt-name{color:var(--text-main);margin-top:2px}
  .tt-detail{color:var(--text-dimmer);margin-top:2px;font-size:11px}

  /* modal-prompt (нативный prompt отключён в Electron) */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(2px)}
  .modal-overlay.show{display:flex}
  .modal-card{background:var(--bg-panel);border:1px solid var(--border-2);border-radius:10px;padding:20px;width:400px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.7)}
  .modal-msg{font-size:13px;color:var(--text-main);margin-bottom:12px;line-height:1.5}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .modal-actions .btn-save{flex:0 0 90px;padding:8px 14px}

  /* pan mode (Space-drag) */
  body.panning, body.panning .map-wrap, body.panning svg.ymap{cursor:grab!important}
  body.panning.is-panning, body.panning.is-panning .map-wrap, body.panning.is-panning svg.ymap{cursor:grabbing!important}

  /* zoom controls */
  .zoom-ctrl{position:fixed;bottom:16px;right:20px;display:flex;gap:4px;align-items:center;z-index:4000;background:rgba(17,31,51,.92);border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .zoom-ctrl button{width:34px;height:34px;background:var(--bg-road);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold;display:flex;align-items:center;justify-content:center;padding:0}
  .zoom-ctrl button:hover{background:var(--hover-bg);color:var(--on-accent)}
  .zoom-ctrl .zoom-pct{min-width:46px;text-align:center;font-size:11px;color:var(--text-dimmer);font-family:monospace}


  /* ── PDF-режим: только SVG без UI ── */
  body.pdf-mode { background:#fff !important; margin:0 !important; padding:0 !important; overflow:hidden !important; height:auto !important; }
  body.pdf-mode > *:not(.main) { display:none !important; }
  body.pdf-mode .main { display:block !important; padding:0 !important; margin:0 !important; background:#fff !important; height:auto !important; width:auto !important; }
  body.pdf-mode .main > *:not(.map-wrap) { display:none !important; }
  body.pdf-mode .map-wrap { background:#fff !important; padding:0 !important; margin:0 !important; overflow:visible !important; height:auto !important; width:auto !important; }
  body.pdf-mode .pan-area { background:#fff !important; padding:0 !important; margin:0 !important; overflow:visible !important; height:auto !important; width:auto !important; display:block !important; }
  body.pdf-mode .svg-sizer { transform:none !important; width:auto !important; height:auto !important; display:block !important; }
  body.pdf-mode .ymap { width:100vw !important; height:100vh !important; max-width:none !important; max-height:none !important; background:#fff !important; display:block !important; }
  body.pdf-mode .stall-rect.edit-selected, body.pdf-mode .stall-rect.form-selected, body.pdf-mode .passage-rect.edit-selected { stroke-width:0.5 !important; filter:none !important; }
  body.pdf-mode .sv-bg-plot, body.pdf-mode .sv-bg-canvas { fill:#ffffff !important; }
  body.pdf-mode .modal-overlay, body.pdf-mode #tooltip, body.pdf-mode .progress-bar { display:none !important; }
  @media print {
    body { background:#fff !important; }
    body > *:not(.main) { display:none !important; }
    body .main > *:not(.map-wrap) { display:none !important; }
  }
</style>
</head>
<body class="tool-pointer">

<header>
  <h1>🏪 План</h1>
  <div class="header-stats">
    <span>Прилавков: <span class="val" id="st-total">0</span></span>
    <span style="display:none">Проходов: <span class="val" id="st-passages">0</span></span>
    <span>Поток: <span class="val" id="st-flows">0</span></span>
    <span style="display:none">Заполнено: <span class="val" id="st-filled">0</span></span>
    <span class="stat-A">A: <span id="st-A">0</span></span>
    <span class="stat-B">B: <span id="st-B">0</span></span>
    <span class="stat-C">C: <span id="st-C">0</span></span>
    <span class="stat-D">D: <span id="st-D">0</span></span>
  </div>
</header>

<div class="toolbar">
  <div class="floor-tabs" id="floor-tabs" style="flex:1"></div>
  <button class="btn btn-icon" id="btn-theme" onclick="toggleTheme()" title="Светлая / тёмная тема">🌓</button>
  <button class="btn btn-icon" id="btn-undo" onclick="undo()" title="Отменить (Cmd+Z)" disabled>↶</button>
  <button class="btn btn-icon" id="btn-redo" onclick="redo()" title="Повторить (Cmd+Shift+Z)" disabled>↷</button>
  <button class="btn btn-success" onclick="toggleEdit()" id="btn-edit">⚙ Режим редактирования</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div class="main">
  <div class="tool-palette" id="tool-palette">
    <button class="tool-btn active" data-tool="pointer" onclick="setTool('pointer')" title="Двигать / выделять"><span>🖱</span><span class="lbl">Двигать</span></button>
    <button class="tool-btn" data-tool="stall" onclick="setTool('stall')" title="Прилавок (клик)"><span>📦</span><span class="lbl">Прилавок</span></button>
    <button class="tool-btn" data-tool="passage" onclick="setTool('passage')" title="Зона: drag-прямоугольник, спросит тип"><span>🟦</span><span class="lbl">Зона</span></button>
    <button class="tool-btn" data-tool="flow" onclick="setTool('flow')" title="Пешеходный поток"><span>👥</span><span class="lbl">Поток</span></button>
    <button class="tool-btn" data-tool="vertex" onclick="setTool('vertex')" title="Контуры зданий и участка"><span>⬡</span><span class="lbl">Контур</span></button>

function polygonAreaPx(pts){
  let a=0;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    a+=(pts[j][0]+pts[i][0])*(pts[j][1]-pts[i][1]);

}

function rectOverlap(a,b){return !(a.x+a.w<b.x||b.x+b.w<a.x||a.y+a.h<b.y||b.y+b.h<a.y);}

// ── свой prompt (нативный отключён в Electron) ──
function myPrompt(msg, defaultVal='', opts={}){
  return new Promise(resolve=>{
    if(modalOpen){resolve(null);return;}
    modalOpen=true;
    const overlay=document.getElementById('modal-overlay');
    const msgEl=document.getElementById('modal-msg');
    const input=document.getElementById('modal-input');
    const okBtn=document.getElementById('modal-ok');
    const cancelBtn=document.getElementById('modal-cancel');
    msgEl.textContent=msg;
    input.value=defaultVal==null?'':String(defaultVal);
    input.type=opts.type||'text';
    if(opts.placeholder) input.placeholder=opts.placeholder; else input.removeAttribute('placeholder');
    overlay.classList.add('show');
    setTimeout(()=>{input.focus();input.select();},30);
    const close=val=>{
      modalOpen=false;
      overlay.classList.remove('show');
      okBtn.onclick=null;
      cancelBtn.onclick=null;
      input.removeEventListener('keydown',onKey);
      resolve(val);
    };
    const onKey=e=>{
      if(e.key==='Enter'){e.preventDefault();e.stopPropagation();close(input.value);}
      else if(e.key==='Escape'){e.preventDefault();e.stopPropagation();close(null);}
    };
    okBtn.onclick=()=>close(input.value);
    cancelBtn.onclick=()=>close(null);
    input.addEventListener('keydown',onKey);
  });
}

      typeSel.removeEventListener('keydown',onKey);

    const onKey=e=>{
      if(e.key==='Enter'){e.preventDefault();e.stopPropagation();close({type:typeSel.value,label:lblInp.value.trim()});}
      else if(e.key==='Escape'){e.preventDefault();e.stopPropagation();close(null);}
    };
    okBtn.onclick=()=>close({type:typeSel.value,label:lblInp.value.trim()});
    cancelBtn.onclick=()=>close(null);
    delBtn.onclick=()=>close('delete');

    typeSel.addEventListener('keydown',onKey);

// история
let history=[];
let historyIdx=-1;
const HISTORY_MAX=80;

// ═══════════════ УТИЛИТЫ ═══════════════
function parsePath(d){
  const pts=[];
  const tokens=d.match(/[MLZmlz][^MLZmlz]*/g)||[];
  for(const t of tokens){
    if(t[0].toUpperCase()==='Z')continue;
    const nums=t.slice(1).trim().split(/[\s,]+/).filter(Boolean).map(Number);
    for(let i=0;i+1<nums.length;i+=2) pts.push([nums[i],nums[i+1]]);
  }
  return pts;
}
function pointsToPath(pts){
  return 'M '+pts.map((p,i)=>(i===0?'':'L ')+p[0]+' '+p[1]).join(' ')+' Z';
}
function pointInPolygon(x,y,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>y)!=(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function whichBuilding(x,y){
  for(const b of BUILDINGS){
    if(pointInPolygon(x,y,parsePath(b.path))) return b.id;
  }
  return null;
}
function getNextStallId(prefix){
  let max=0; const p=prefix+'-';
  for(const id of Object.keys(stalls)){
    if(id.startsWith(p)){
      const n=parseInt(id.slice(p.length),10);
      if(!isNaN(n)&&n>max) max=n;
    }
  }
  return p+String(max+1).padStart(3,'0');
}

// стиль потоковой линии в зависимости от количества чел/ч
function flowStyle(count){
  const c=+count||0;
  const w=0.3;   // все линии одинаково тонкие — интенсивность кодируется цветом
  let color;
  if(c<200)        color='#3498db';
  else if(c<500)   color='#1abc9c';
  else if(c<1000)  color='#f1c40f';
  else if(c<2000)  color='#e67e22';
  else             color='#e74c3c';
  return {w,color};
}

// ═══════════════ ХРАНИЛИЩЕ + МИГРАЦИЯ ═══════════════
function makeDefaultBuildings(){
  return JSON.parse(JSON.stringify(DEFAULT_BUILDINGS));
}
function makeEmptyFloor(name){
  return {name, stalls:{}, passages:[], buildings:makeDefaultBuildings(), flows:[], site:null, annotations:[]};
}

function loadAll(){
  // пробуем новый формат
  try{
    const data=JSON.parse(localStorage.getItem(FLOORS_KEY));
    if(data && Array.isArray(data.floors) && data.floors.length>0){
      floors=data.floors;
      currentFloorIdx=Math.max(0,Math.min(data.currentFloorIdx||0, floors.length-1));
      // нормализация — у каждого этажа должны быть все поля
      for(const f of floors){
        if(!f.stalls) f.stalls={};
        if(!f.passages) f.passages=[];
        if(!f.flows) f.flows=[];
        if(!f.buildings || f.buildings.length===0) f.buildings=makeDefaultBuildings();
        if(f.site===undefined) f.site=null;
        if(!f.annotations) f.annotations=[];
      }
      syncAliases();
      return;
    }
  }catch{}

  // миграция из старого формата
  let oldStalls={}, oldPassages=[], oldBuildings=makeDefaultBuildings();
  try{const v=localStorage.getItem(LEGACY_STALLS_V2); if(v) oldStalls=JSON.parse(v)||{};}catch{}
  if(Object.keys(oldStalls).length===0){
    try{const v=localStorage.getItem(LEGACY_STALLS_V1); if(v) oldStalls=JSON.parse(v)||{};}catch{}
  }
  try{const v=localStorage.getItem(LEGACY_PASSAGES); if(v) oldPassages=JSON.parse(v)||[];}catch{}
  try{
    const v=localStorage.getItem(LEGACY_CONFIG);
    if(v){
      const saved=JSON.parse(v);
      oldBuildings=DEFAULT_BUILDINGS.map(def=>{
        const s=saved.find(x=>x.id===def.id);
        if(!s)return JSON.parse(JSON.stringify(def));
        return{...JSON.parse(JSON.stringify(def)),
          rows:s.rows??def.rows, cols:s.cols??def.cols,
          gapX:s.gapX??def.gapX, gapY:s.gapY??def.gapY,
          path:s.path||def.path,
          stallArea:{...def.stallArea,...(s.stallArea||{})}};
      });
    }
  }catch{}

  floors=[{name:'1-й этаж', stalls:oldStalls, passages:oldPassages, buildings:oldBuildings, flows:[]}];
  currentFloorIdx=0;
  syncAliases();
}

function syncAliases(){
  const f=floors[currentFloorIdx];
  stalls=f.stalls;
  passages=f.passages;
  BUILDINGS=f.buildings;
  flows=f.flows;
  annotations=f.annotations||[];
}

function saveAll(){
  // на случай если алиасы реассайнились (после реассигна clearAll и т.п.) — синхронизируем
  const f=floors[currentFloorIdx];
  f.stalls=stalls; f.passages=passages; f.buildings=BUILDINGS; f.flows=flows; f.annotations=annotations;
  localStorage.setItem(FLOORS_KEY, JSON.stringify({floors,currentFloorIdx}));
}
// псевдо-savers, всё идёт через saveAll
const saveStalls=saveAll, savePassages=saveAll, saveConfig=saveAll, saveFlows=saveAll;

// миграция: у прилавков без x/y — посчитать позиции
function migrateStallPositions(){
  let changed=false;
  for(const f of floors){
    for(const [id,data] of Object.entries(f.stalls)){
      if(typeof data.x==='number' && typeof data.y==='number') continue;
      const m=id.match(/^([A-ZА-Я0-9]+)-(\d+)$/);
      if(!m)continue;
      const [,bid,numStr]=m;
      const b=f.buildings.find(x=>x.id===bid);
      if(!b)continue;
      const n=parseInt(numStr,10);
      if(isNaN(n))continue;
      const r=Math.floor((n-1)/b.cols), c=(n-1)%b.cols;
      const sw=(b.stallArea.w-(b.cols-1)*b.gapX)/b.cols;
      const sh=(b.stallArea.h-(b.rows-1)*b.gapY)/b.rows;
      data.x=Math.round(b.stallArea.x+c*(sw+b.gapX));
      data.y=Math.round(b.stallArea.y+r*(sh+b.gapY));
      data.w=Math.round(sw);
      data.h=Math.round(sh);
      data.building=bid;
      changed=true;
    }
  }
  if(changed) saveAll();
}

function generateGrid(buildingId, replace=false){
  const b=BUILDINGS.find(x=>x.id===buildingId);
  if(!b)return;
  const {rows,cols,gapX,gapY,stallArea:sa}=b;
  if(replace){
    for(const id of Object.keys(stalls))
      if(stalls[id].building===buildingId) delete stalls[id];
  }
  const sw=(sa.w-(cols-1)*gapX)/cols;
  const sh=(sa.h-(rows-1)*gapY)/rows;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const num=r*cols+c+1;
      const id=`${buildingId}-${String(num).padStart(3,'0')}`;
      const existing=stalls[id];
      stalls[id]={
        ...(existing||{}),
        x:Math.round(sa.x+c*(sw+gapX)),
        y:Math.round(sa.y+r*(sh+gapY)),
        w:Math.round(sw),
        h:Math.round(sh),
        building:buildingId,
      };
    }
  }
  saveAll();
}

function ensureInitial(){
  if(floors.length===0){
    floors.push(makeEmptyFloor('1-й этаж'));
    currentFloorIdx=0;
    syncAliases();
  }
  // если на 1-м этаже нет прилавков — нагенерим по сетке
  const f=floors[0];
  if(Object.keys(f.stalls).length===0){
    const prev={stalls,passages,BUILDINGS,flows,currentFloorIdx};
    currentFloorIdx=0;
    syncAliases();
    for(const b of f.buildings) generateGrid(b.id);
    // вернёмся в текущий
    currentFloorIdx=prev.currentFloorIdx;
    syncAliases();
  }
}

// ═══════════════ ЭТАЖИ ═══════════════
function renderFloorTabs(){
  const c=document.getElementById('floor-tabs');
  c.innerHTML='';
  floors.forEach((f,i)=>{
    const tab=document.createElement('div');
    tab.className='floor-tab'+(i===currentFloorIdx?' active':'');
    const stallsCount=Object.keys(f.stalls).length;
    tab.innerHTML=`
      <span onclick="switchFloor(${i})">${escapeHtml(f.name)}</span>
      <span class="ft-cnt" onclick="switchFloor(${i})">${stallsCount}</span>
      <button class="ft-act" onclick="renameFloorPrompt(${i})" title="Переименовать">✏</button>
      <button class="ft-act" onclick="deleteFloorPrompt(${i})" title="Удалить этаж">×</button>
    `;
    tab.querySelector('span').addEventListener('click',()=>switchFloor(i));
    c.appendChild(tab);
  });
  const add=document.createElement('button');
  add.className='floor-add';
  add.textContent='+ этаж';
  add.onclick=addFloor;
  c.appendChild(add);
}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function switchFloor(idx){
  if(idx<0||idx>=floors.length||idx===currentFloorIdx)return;
  saveAll();
  currentFloorIdx=idx;
  syncAliases();
  // если у этажа пустые здания — восстановить из дефолта (либо скопировать с 1-го этажа)
  if(!BUILDINGS || BUILDINGS.length===0){
    const src = floors.find((f,i)=>i!==idx && f.buildings && f.buildings.length>0);
    floors[idx].buildings = src ? JSON.parse(JSON.stringify(src.buildings)) : makeDefaultBuildings();
    syncAliases();
    saveAll();
  }
  setTimeout(centerView, 30);
  selectionSet.clear();
  selectedId=null; closeSidebar();
  drawingFlow=null; drawingPassage=null;
  saveAll();
  renderFloorTabs();
  if(editMode) renderEditPanel();
  buildSVG();
  updateStats();
}

function addFloor(){
  myPrompt('Название нового этажа:',`${floors.length+1}-й этаж`).then(name=>{
    if(!name)return;
    const buildings=JSON.parse(JSON.stringify(floors[currentFloorIdx].buildings));
    floors.push({name:name.trim(), stalls:{}, passages:[], buildings, flows:[]});
    pushHistory();
    switchFloor(floors.length-1);
  });
}

function renameFloorPrompt(idx){
  myPrompt('Новое название этажа:', floors[idx].name).then(name=>{
    if(!name) return;
    floors[idx].name=name.trim();
    pushHistory();
    saveAll();
    renderFloorTabs();
  });
}

function deleteFloorPrompt(idx){
  if(floors.length<=1){alert('Должен остаться хотя бы один этаж.');return;}
  if(!confirm(`Удалить «${floors[idx].name}» вместе со всеми прилавками, проходами и потоками этого этажа?`))return;
  floors.splice(idx,1);
  if(currentFloorIdx>=floors.length) currentFloorIdx=floors.length-1;
  pushHistory();
  syncAliases();
  renderFloorTabs();
  if(editMode) renderEditPanel();
  buildSVG();
  updateStats();
}

// ═══════════════ SVG ═══════════════
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs,text){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);
  if(text!==undefined)e.textContent=text;
  return e;
}
// ─── THEME ───
const THEME_KEY='yarmarka-theme';
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const btn=document.getElementById('btn-theme');
  if(btn) btn.textContent = theme==='light' ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, theme);
  // тема меняется через CSS-переменные — перерендер не нужен (но если floors уже загружены, можно)
  if(typeof floors!=='undefined' && floors.length>0 && typeof buildSVG==='function') buildSVG();
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='light'?'dark':'light');
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

// ─── ZOOM ───
// zoom = логический множитель к "100%" (где 100% = подгонка под видимую область)
let zoom=1;
let fitScale=1; // абсолютный CSS-масштаб, при котором SVG целиком помещается во вьюпорт
const ZOOM_MIN=0.1, ZOOM_MAX=30;
function recalcFitScale(){
  const wrap=document.querySelector('.map-wrap');
  if(!wrap) return 1;
  // оставляем небольшой запас по краям
  const padW=40, padH=40;
  const aw=Math.max(50, wrap.clientWidth - padW);
  const ah=Math.max(50, wrap.clientHeight - padH);
  fitScale = Math.min(aw/960, ah/1090);
  if(!isFinite(fitScale) || fitScale<=0) fitScale=1;
  return fitScale;
}
function applyZoom(pivot){
  const wrap=document.querySelector('.map-wrap');
  const sizer=document.getElementById('svg-sizer');
  const svg=document.getElementById('ymap');
  if(!wrap||!sizer||!svg) return;
  const eff = zoom*fitScale; // эффективный CSS-масштаб
  sizer.style.width  = (960*eff)+'px';
  sizer.style.height = (1090*eff)+'px';
  svg.style.transform = `scale(${eff})`;
  const lbl=document.getElementById('zoom-pct');
  if(lbl) lbl.textContent=Math.round(zoom*100)+'%';
  if(pivot){
    wrap.scrollLeft = pivot.worldX*eff - pivot.localX;
    wrap.scrollTop  = pivot.worldY*eff - pivot.localY;
  }
}
function setZoom(z, pivot){
  z=Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
  if(Math.abs(z-zoom)<0.001 && !pivot) return;
  zoom=z;
  applyZoom(pivot);
}
function zoomIn(){setZoom(zoom*1.25); setTimeout(centerView,30);}
function zoomOut(){setZoom(zoom/1.25); setTimeout(centerView,30);}
function zoomReset(){ recalcFitScale(); zoom=1; applyZoom(); setTimeout(centerView,30); }
// при изменении размера окна — пересчитываем fitScale; если на "100%", обновляем рендер
window.addEventListener('resize', ()=>{ recalcFitScale(); applyZoom(); setTimeout(centerView,30); });
// центрирует видимый SVG в видимой части map-wrap (учитывает реальную позицию sizer)
function centerView(){
  const wrap=document.querySelector('.map-wrap');
  const sizer=document.getElementById('svg-sizer');
  if(!wrap||!sizer) return;
  const wrapRect=wrap.getBoundingClientRect();
  const sizerRect=sizer.getBoundingClientRect();
  // позиция sizer внутри прокручиваемого контента wrap
  const sizerX=sizerRect.left-wrapRect.left+wrap.scrollLeft;
  const sizerY=sizerRect.top-wrapRect.top+wrap.scrollTop;
  wrap.scrollLeft=sizerX+sizerRect.width/2-wrap.clientWidth/2;
  wrap.scrollTop =sizerY+sizerRect.height/2-wrap.clientHeight/2;
}

// ─── PAN: пробел+drag или средняя кнопка мыши ───
let panState=null;
let spaceHeld=false;
document.addEventListener('keydown',e=>{
  if(e.code==='Space' && !spaceHeld){
    if(document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    e.preventDefault();
    spaceHeld=true;
    document.body.classList.add('panning');
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'){
    spaceHeld=false;
    document.body.classList.remove('panning','is-panning');
  }
});
function startPan(e){
  const wrap=document.querySelector('.map-wrap');
  panState={x:e.clientX, y:e.clientY, scrollX:wrap.scrollLeft, scrollY:wrap.scrollTop};
  document.body.classList.add('is-panning');
}
function doPan(e){
  if(!panState)return;
  const wrap=document.querySelector('.map-wrap');
  wrap.scrollLeft = panState.scrollX - (e.clientX-panState.x);
  wrap.scrollTop  = panState.scrollY - (e.clientY-panState.y);
}
function endPan(){panState=null; document.body.classList.remove('is-panning');}

function svgPoint(evt){
  const svg=document.getElementById('ymap');
  const pt=svg.createSVGPoint();
  pt.x=evt.clientX;pt.y=evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function buildSVG(){
  const svg=document.getElementById('ymap');
  svg.innerHTML='';

  // единая подложка под всем планом
  svg.appendChild(el('rect',{x:-80,y:-60,width:960,height:1090,class:'sv-bg-plot'}));

  // контур участка (под зданиями)
  renderSite(svg);

  // здания
  _placedBuildingLabels=[];
  for(const b of BUILDINGS) renderBuilding(svg,b);

  // узел сетей в С3
  const c3=BUILDINGS.find(b=>b.id==='C3');
  if(c3 && c3.utilityNode){
    const[ux,uy]=c3.utilityNode;
    svg.appendChild(el('circle',{cx:ux,cy:uy,r:8,fill:'#e74c3c',opacity:.95,'pointer-events':'none'}));
    svg.appendChild(el('text',{x:ux,y:uy+3.5,'text-anchor':'middle','font-size':10,fill:'#fff','font-weight':'bold','font-family':'sans-serif','pointer-events':'none'},'⚡'));
  }

  // проходы (под прилавками и потоками)
  for(const p of passages) renderPassage(svg,p);

  // прилавки
  for(const [id, s] of Object.entries(stalls)) renderStall(svg, id, s);

  // потоки — поверх всего
  for(const f of flows) renderFlow(svg, f);

  // текстовые аннотации — поверх всего
  renderAnnotations(svg);

  // оверлеи редактирования
  if(editMode){
    if(currentTool==='vertex') renderVertexHandles(svg);
    renderEditSelectionOverlays(svg);
    if(drawingFlow) renderFlowGhost(svg);
  }
}

// Глобальный реестр прямоугольников уже размещённых меток корпусов на этом кадре.
// Используется для автоматического сдвига при пересечении.
let _placedBuildingLabels=[];
function renderBuilding(svg, b){
  const pathAttrs={id:`bld-${b.id}`,d:b.path,class:'building-outline','pointer-events':'none'};
  if(b.fillColor){ pathAttrs.fill=b.fillColor; pathAttrs.style=`fill:${b.fillColor}`; }
  svg.appendChild(el('path', pathAttrs));
  // ID корпуса — над правым верхним углом контура; смещаем при коллизии
  const pts=parsePath(b.path);
  if(pts.length){
    let minY=pts[0][1], maxX=pts[0][0];
    for(const p of pts){if(p[0]>maxX)maxX=p[0]; if(p[1]<minY)minY=p[1];}
    // если задан кастомный labelXY — используем его
    let lx, ly;
    if(Array.isArray(b.labelXY) && b.labelXY.length===2){
      lx=b.labelXY[0]; ly=b.labelXY[1];
    } else {
      lx=maxX; ly=minY-4;
    }
    // приблизительный размер подписи
    const W = (b.id||'').length * 8.5;   // ширина текста (font-size:13, weight:800)
    const H = 14;
    // bbox метки: учитываем text-anchor:'end' — x — правый край
    const tryRect = (x,y)=>({x:x-W, y:y-H+2, w:W, h:H});
    let rect = tryRect(lx, ly);
    // если пересекает уже размещённую — сдвигаем влево/вверх постепенно
    const overlaps = r => _placedBuildingLabels.some(p=>!(r.x+r.w<p.x || r.x>p.x+p.w || r.y+r.h<p.y || r.y>p.y+p.h));
    let tries=0;
    while(overlaps(rect) && tries<10){
      // сдвиг влево на ширину метки + 4
      lx -= (W + 4);
      rect = tryRect(lx, ly);
      tries++;
    }
    _placedBuildingLabels.push(rect);
    const labelAttrs={
      x:lx, y:ly,
      'font-size':13,'font-weight':800,fill:'#e94560',
      'font-family':'sans-serif','text-anchor':'end',
      'data-bid':b.id, 'data-kind':'bld-label',
    };
    if(editMode){ labelAttrs.style='cursor:move'; }
    else { labelAttrs['pointer-events']='none'; }
    svg.appendChild(el('text', labelAttrs, b.id));
  }
}

// П-форма: прямоугольник с прямоугольным вырезом на одной из 4-х сторон (по центру)
// s.cut = {side:'top'|'bottom'|'left'|'right', cw, ch}
//   side='bottom' → вырез снизу, открыт вниз (как буква П)
//   side='top'    → вырез сверху, открыт вверх
//   side='left'   → вырез слева
//   side='right'  → вырез справа
function pPathD(s){
  const x=s.x,y=s.y,w=s.w,h=s.h;
  const c=s.cut||{};
  const side=c.side||'bottom';
  if(side==='top'||side==='bottom'){
    const cw=Math.min(Math.max(2,c.cw|0), w-4);
    const ch=Math.min(Math.max(2,c.ch|0), h-2);
    const left=Math.round((w-cw)/2);
    if(side==='bottom') return `M${x},${y} L${x+w},${y} L${x+w},${y+h} L${x+left+cw},${y+h} L${x+left+cw},${y+h-ch} L${x+left},${y+h-ch} L${x+left},${y+h} L${x},${y+h} Z`;
    // top
    return `M${x},${y} L${x+left},${y} L${x+left},${y+ch} L${x+left+cw},${y+ch} L${x+left+cw},${y} L${x+w},${y} L${x+w},${y+h} L${x},${y+h} Z`;
  }
  // left/right — вырез по вертикали
  const cw=Math.min(Math.max(2,c.cw|0), w-2);
  const ch=Math.min(Math.max(2,c.ch|0), h-4);
  const top=Math.round((h-ch)/2);
  if(side==='right') return `M${x},${y} L${x+w},${y} L${x+w},${y+top} L${x+w-cw},${y+top} L${x+w-cw},${y+top+ch} L${x+w},${y+top+ch} L${x+w},${y+h} L${x},${y+h} Z`;
  // left
  return `M${x},${y} L${x+w},${y} L${x+w},${y+h} L${x},${y+h} L${x},${y+top+ch} L${x+cw},${y+top+ch} L${x+cw},${y+top} L${x},${y+top} Z`;
}

function lPathD(s){
  const x=s.x,y=s.y,w=s.w,h=s.h;
  const cw=Math.min(Math.max(2,s.cut.cw|0), w-2);
  const ch=Math.min(Math.max(2,s.cut.ch|0), h-2);
  const c=s.cut.corner||'tr';
  if(c==='tr') return `M${x},${y} L${x+w-cw},${y} L${x+w-cw},${y+ch} L${x+w},${y+ch} L${x+w},${y+h} L${x},${y+h} Z`;
  if(c==='tl') return `M${x+cw},${y} L${x+w},${y} L${x+w},${y+h} L${x},${y+h} L${x},${y+ch} L${x+cw},${y+ch} Z`;
  if(c==='br') return `M${x},${y} L${x+w},${y} L${x+w},${y+h-ch} L${x+w-cw},${y+h-ch} L${x+w-cw},${y+h} L${x},${y+h} Z`;
  return `M${x},${y} L${x+w},${y} L${x+w},${y+h} L${x+cw},${y+h} L${x+cw},${y+h-ch} L${x},${y+h-ch} Z`;
}
function lEdges(s){
  const x=s.x,y=s.y,w=s.w,h=s.h;
  const cw=Math.min(Math.max(2,s.cut.cw|0), w-2);
  const ch=Math.min(Math.max(2,s.cut.ch|0), h-2);
  const c=s.cut.corner||'tr';
  if(c==='tr') return [
    {role:'top',    x1:x,        y1:y,    x2:x+w-cw, y2:y,    o:'h'},
    {role:'notch-v',x1:x+w-cw,   y1:y,    x2:x+w-cw, y2:y+ch, o:'v'},
    {role:'notch-h',x1:x+w-cw,   y1:y+ch, x2:x+w,    y2:y+ch, o:'h'},
    {role:'right',  x1:x+w,      y1:y+ch, x2:x+w,    y2:y+h,  o:'v'},
    {role:'bottom', x1:x+w,      y1:y+h,  x2:x,      y2:y+h,  o:'h'},
    {role:'left',   x1:x,        y1:y+h,  x2:x,      y2:y,    o:'v'},
  ];
  if(c==='tl') return [
    {role:'top',    x1:x+cw,     y1:y,    x2:x+w,    y2:y,    o:'h'},
    {role:'right',  x1:x+w,      y1:y,    x2:x+w,    y2:y+h,  o:'v'},
    {role:'bottom', x1:x+w,      y1:y+h,  x2:x,      y2:y+h,  o:'h'},
    {role:'left',   x1:x,        y1:y+h,  x2:x,      y2:y+ch, o:'v'},
    {role:'notch-h',x1:x,        y1:y+ch, x2:x+cw,   y2:y+ch, o:'h'},
    {role:'notch-v',x1:x+cw,     y1:y+ch, x2:x+cw,   y2:y,    o:'v'},
  ];
  if(c==='br') return [
    {role:'top',    x1:x,        y1:y,    x2:x+w,    y2:y,    o:'h'},
    {role:'right',  x1:x+w,      y1:y,    x2:x+w,    y2:y+h-ch, o:'v'},
    {role:'notch-h',x1:x+w,      y1:y+h-ch, x2:x+w-cw, y2:y+h-ch, o:'h'},
    {role:'notch-v',x1:x+w-cw,   y1:y+h-ch, x2:x+w-cw, y2:y+h,    o:'v'},
    {role:'bottom', x1:x+w-cw,   y1:y+h,  x2:x,      y2:y+h,  o:'h'},
    {role:'left',   x1:x,        y1:y+h,  x2:x,      y2:y,    o:'v'},
  ];
  return [
    {role:'top',    x1:x,        y1:y,    x2:x+w,    y2:y,    o:'h'},
    {role:'right',  x1:x+w,      y1:y,    x2:x+w,    y2:y+h,  o:'v'},
    {role:'bottom', x1:x+w,      y1:y+h,  x2:x+cw,   y2:y+h,  o:'h'},
    {role:'notch-v',x1:x+cw,     y1:y+h,  x2:x+cw,   y2:y+h-ch, o:'v'},
    {role:'notch-h',x1:x+cw,     y1:y+h-ch, x2:x,    y2:y+h-ch, o:'h'},
    {role:'left',   x1:x,        y1:y+h-ch, x2:x,    y2:y,    o:'v'},
  ];
}

function renderSite(svg){
  const f=floors[currentFloorIdx];
  const site=f.site;
  // pending — пользователь рисует прямо сейчас
  if(drawingSite){
    const pts=drawingSite.points.slice();
    if(pts.length>=1){
      const d='M '+pts.map(p=>`${p[0]} ${p[1]}`).join(' L ')+(pts.length>=3?' Z':'');
      svg.appendChild(el('path',{d, fill:'rgba(110,180,255,.06)', stroke:'#6eb4ff','stroke-width':1.6,'stroke-dasharray':'6,4','pointer-events':'none'}));
      for(const p of pts){
        svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:3.5,fill:'#6eb4ff',stroke:'#000','stroke-width':1,'pointer-events':'none'}));
      }
    }
    return;
  }
  if(!site || !site.path) return;
  const pts=parsePath(site.path);
  if(pts.length<2) return;
  svg.appendChild(el('path',{
    d:site.path,
    fill:'rgba(80,140,200,.04)',
    stroke:'#6a8eb0','stroke-width':1.6,
    'stroke-dasharray':'8,5','pointer-events':'none',
  }));
  // подпись и кнопка удаления больше не рисуются на карте
  // для управления контуром — инструмент 🗺 Участок (он спросит при существующем)
  // ручки вершин в режиме «Контур»
  if(editMode && currentTool==='vertex'){
    pts.forEach((p,i)=>{
      svg.appendChild(el('circle',{
        cx:p[0],cy:p[1],r:4.5,
        fill:'#6eb4ff',stroke:'#000','stroke-width':1.2,
        style:'cursor:move',
        'data-kind':'site-vertex','data-idx':i,
      }));
    });
  }
}

function renderStall(svg, id, s){
  const imp=s.importance||'';
  const rot=s.r||0;
  const g = rot ? el('g',{transform:`rotate(${rot.toFixed(2)} ${s.x+s.w/2} ${s.y+s.h/2})`}) : svg;
  const isL = s.shape==='L' && s.cut;
  const isP = s.shape==='P' && s.cut;
  const stallAttrs={
    id:`stall-${id}`,
    class:'stall-rect'+(imp?'':' sv-stall-empty')+(editMode && isSelected('stall',id) ? ' edit-selected':'')+(!editMode && selectedId===id ? ' form-selected':''),
    'stroke-width':.6,
    'data-id':id,'data-kind':'stall',
  };
  if(imp){stallAttrs.fill=IMP_COLORS[imp]; stallAttrs.stroke=IMP_STROKE[imp];}
  if(isL){
    stallAttrs.d=lPathD(s);
    g.appendChild(el('path',stallAttrs));
  } else if(isP){
    stallAttrs.d=pPathD(s);
    g.appendChild(el('path',stallAttrs));
  } else {
    stallAttrs.x=s.x; stallAttrs.y=s.y; stallAttrs.width=s.w; stallAttrs.height=s.h; stallAttrs.rx=1.5;
    g.appendChild(el('rect',stallAttrs));
  }
  const b=BUILDINGS.find(x=>x.id===s.building);
  const num=id.split('-').pop();
  const chars=Math.max(1, num.length);
  const PAD=0.6;
  const CHAR_W=0.58;

  // для L-образных прилавков центр текста = центр основной полосы (не bounding box)
  let textW=s.w, textH=s.h;
  let cx=s.x+s.w/2, cy=s.y+s.h/2;
  if(isL && s.cut){
    const cw=Math.min(Math.max(2,s.cut.cw|0),s.w-2);
    const ch=Math.min(Math.max(2,s.cut.ch|0),s.h-2);
    const corner=s.cut.corner||'tr';
    if(corner==='tr'){ textW=s.w-cw; textH=s.h; cx=s.x+textW/2;     cy=s.y+s.h/2; }
    if(corner==='tl'){ textW=s.w-cw; textH=s.h; cx=s.x+cw+textW/2;  cy=s.y+s.h/2; }
    if(corner==='br'){ textW=s.w; textH=s.h-ch;  cx=s.x+s.w/2;      cy=s.y+textH/2; }
    if(corner==='bl'){ textW=s.w; textH=s.h-ch;  cx=s.x+s.w/2;      cy=s.y+textH/2; }
  }

  const fsH = Math.min((textH-PAD*2)*0.95, (textW-PAD*2)/(chars*CHAR_W));
  const fsV = Math.min((textW-PAD*2)*0.95, (textH-PAD*2)/(chars*CHAR_W));
  // горизонталь всегда; вертикаль только если горизонталь нечитаема (< 3px)
  const labelV = fsH < 3 && fsV >= 3;
  const fs = Math.max(2.5, Math.min(9, labelV ? fsV : fsH));

  // сначала добавляем группу прилавка в svg, потом текст поверх
  if(rot) svg.appendChild(g);

  if((textH-PAD*2) >= 2.5 && (textW-PAD*2) >= 2.5){
    // текст в корневом svg (не в повёрнутой группе) — всегда прямой
    let tx=cx, ty=cy;
    if(rot){
      const gx=s.x+s.w/2, gy=s.y+s.h/2;
      const a=rot*Math.PI/180;
      const dx=cx-gx, dy=cy-gy;
      tx=gx+dx*Math.cos(a)-dy*Math.sin(a);
      ty=gy+dx*Math.sin(a)+dy*Math.cos(a);
    }
    // textLength гарантирует что текст не выйдет за пределы прилавка
    const availForText = labelV ? (textH-PAD*2) : (textW-PAD*2);
    const tAttrs={
      x:tx, y:ty,
      'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':fs.toFixed(2),
      'textLength': Math.min(availForText, chars*fs*CHAR_W).toFixed(2),
      'lengthAdjust': 'spacingAndGlyphs',
      fill:imp?'rgba(255,255,255,.78)':'rgba(100,160,220,.5)',
      'pointer-events':'none', 'font-family':'sans-serif',
    };
    if(labelV) tAttrs.transform=`rotate(-90 ${tx} ${ty})`;
    svg.appendChild(el('text',tAttrs,num));
  }
}

function tangentAtMid(pts){
  if(pts.length<2) return {dx:1,dy:0};
  let total=0; const lens=[];
  for(let i=1;i<pts.length;i++){
    const l=Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1]);
    lens.push(l); total+=l;
  }
  const target=total/2;
  let acc=0;
  for(let i=0;i<lens.length;i++){
    if(acc+lens[i]>=target){
      return {dx:pts[i+1][0]-pts[i][0], dy:pts[i+1][1]-pts[i][1]};
    }
    acc+=lens[i];
  }
  return {dx:pts[pts.length-1][0]-pts[0][0], dy:pts[pts.length-1][1]-pts[0][1]};
}

function renderFlow(svg, f){
  const {w,color}=flowStyle(f.count);
  const pts=f.points;
  if(pts.length<2)return;
  const d='M '+pts.map(p=>p.join(' ')).join(' L ');
  const sel=editMode && isSelected('flow',f.id);
  svg.appendChild(el('path',{
    id:`flow-${f.id}`,
    class:'flow-line'+(sel?' edit-selected':''),
    d, stroke:color,'stroke-width':w,
    'stroke-linejoin':'round','stroke-linecap':'round',
    'stroke-dasharray': Math.max(4, w*2.2)+','+Math.max(3, w*1.6),
    opacity:0.85,
    'data-id':f.id,'data-kind':'flow',
  }));
  // стрелка на конце
  const last=pts[pts.length-1], prev=pts[pts.length-2];
  const ang=Math.atan2(last[1]-prev[1], last[0]-prev[0]);
  const ah=Math.max(8, w*1.4);
  const ax1=last[0]-ah*Math.cos(ang-Math.PI/6), ay1=last[1]-ah*Math.sin(ang-Math.PI/6);
  const ax2=last[0]-ah*Math.cos(ang+Math.PI/6), ay2=last[1]-ah*Math.sin(ang+Math.PI/6);
  svg.appendChild(el('polygon',{
    points:`${last[0]},${last[1]} ${ax1},${ay1} ${ax2},${ay2}`,
    fill:color, opacity:0.95,'pointer-events':'none',
  }));
  // подпись чел/ч — вдоль линии. Авто-разворот: если линия идёт справа-налево
  // (или почти вертикально вверх) — текст бы оказался вверх ногами. В этом случае
  // подкладываем невидимый «реверсный» path и натягиваем текст на него.
  const tan=tangentAtMid(pts);
  const reverseLabel = tan.dx < -0.01 || (Math.abs(tan.dx) < 1.5 && tan.dy < 0);
  let labelPathId=`flow-${f.id}`;
  if(reverseLabel){
    const revPts=pts.slice().reverse();
    const revD='M '+revPts.map(p=>p.join(' ')).join(' L ');
    svg.appendChild(el('path',{
      id:`flow-rev-${f.id}`,
      d:revD, fill:'none', stroke:'none','pointer-events':'none',
    }));
    labelPathId=`flow-rev-${f.id}`;
  }
  const labelText=(f.count||0)+' чел/сут';
  // dy: на исходном пути -5 поднимает текст «над» линией в экранных координатах.
  // На реверсном пути «над» = +5 (т.к. перпендикуляр инвертируется).
  const textEl=el('text',{class:'flow-label','text-anchor':'middle',dy:reverseLabel?5:-5});
  const tp=document.createElementNS(NS,'textPath');
  tp.setAttribute('href',`#${labelPathId}`);
  tp.setAttribute('startOffset','50%');
  tp.textContent=labelText;
  textEl.appendChild(tp);
  svg.appendChild(textEl);
}

// 4 угла прямоугольника с учётом поворота вокруг его центра
function rotatedCorners(obj){
  const r=(obj.r||0)*Math.PI/180;
  const corners=[
    [obj.x,obj.y],
    [obj.x+obj.w,obj.y],
    [obj.x+obj.w,obj.y+obj.h],
    [obj.x,obj.y+obj.h],
  ];
  if(!r) return corners;
  const cx=obj.x+obj.w/2, cy=obj.y+obj.h/2;
  const cs=Math.cos(r), sn=Math.sin(r);
  return corners.map(([px,py])=>{
    const dx=px-cx, dy=py-cy;
    return [cx+dx*cs-dy*sn, cy+dx*sn+dy*cs];
  });
}

function getGroupBBox(){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  const add=(x,y)=>{if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;};
  for(const{type,id} of selectionItems()){
    if(type==='stall'){const s=stalls[id]; if(!s)continue; for(const c of rotatedCorners(s)) add(c[0],c[1]);}
    else if(type==='passage'){const ps=passages.find(p=>p.id===id); if(!ps)continue; for(const c of rotatedCorners(ps)) add(c[0],c[1]);}
    else if(type==='flow'){const f=flows.find(x=>x.id===id); if(!f)continue; for(const p of f.points) add(p[0],p[1]);}
  }
  if(minX===Infinity)return null;
  return {minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
}

function renderEditSelectionOverlays(svg){
  if(selectionSet.size===0)return;
  const bb=getGroupBBox();
  if(!bb)return;
  const pad=6;
  // рамка
  svg.appendChild(el('rect',{
    x:bb.minX-pad, y:bb.minY-pad,
    width:bb.w+pad*2, height:bb.h+pad*2,
    fill:'none', stroke:'#ffe600','stroke-width':0.5,
    'stroke-dasharray':'4,2','pointer-events':'none',
  }));
  if(selectionSet.size>1){
    svg.appendChild(el('text',{
      x:bb.minX-pad+4, y:bb.minY-pad-4,
      'font-size':10, fill:'#ffe600','font-family':'sans-serif','font-weight':700,'pointer-events':'none',
    }, `выделено: ${selectionSet.size}`));
  }
  // 4 угловые + 4 боковые ручки ресайза
  const corners=[
    {role:'nw',x:bb.minX-pad,y:bb.minY-pad,cur:'nwse-resize'},
    {role:'ne',x:bb.maxX+pad,y:bb.minY-pad,cur:'nesw-resize'},
    {role:'sw',x:bb.minX-pad,y:bb.maxY+pad,cur:'nesw-resize'},
    {role:'se',x:bb.maxX+pad,y:bb.maxY+pad,cur:'nwse-resize'},
    // боковые ручки — меняют только одну ось
    {role:'n', x:(bb.minX+bb.maxX)/2, y:bb.minY-pad,           cur:'ns-resize'},
    {role:'s', x:(bb.minX+bb.maxX)/2, y:bb.maxY+pad,           cur:'ns-resize'},
    {role:'w', x:bb.minX-pad,         y:(bb.minY+bb.maxY)/2,   cur:'ew-resize'},
    {role:'e', x:bb.maxX+pad,         y:(bb.minY+bb.maxY)/2,   cur:'ew-resize'},
  ];
  for(const c of corners){
    svg.appendChild(el('rect',{
      x:c.x-3,y:c.y-3,width:6,height:6,
      fill:'#ffe600',stroke:'#000','stroke-width':0.5,
      style:`cursor:${c.cur}`,
      'data-kind':'group-resize','data-role':c.role,
    }));
  }
  // ручка поворота — над центром
  const rotY=bb.minY-pad-16;
  svg.appendChild(el('line',{
    x1:bb.cx, y1:bb.minY-pad, x2:bb.cx, y2:rotY+4,
    stroke:'#ffe600','stroke-width':0.5,
    'pointer-events':'none',
  }));
  svg.appendChild(el('circle',{
    cx:bb.cx, cy:rotY, r:4,
    fill:'#ffe600',stroke:'#000','stroke-width':0.6,
    style:'cursor:grab',
    'data-kind':'group-rotate',
  }));
  // 4 кнопки выравнивания — над рамкой, слева от ручки поворота, видны при ≥2 элементах
  if(selectionSet.size>=2){
    const alignY=bb.minY-pad-22;
    const aBtnX=bb.minX-pad+12;
    const ALIGN_BTNS=[
      {role:'left',   x:aBtnX,      label:'⟸', title:'Выровнять по левому краю (Alt+L)'},
      {role:'right',  x:aBtnX+22,   label:'⟹', title:'Выровнять по правому краю (Alt+R)'},
      {role:'top',    x:aBtnX+44,   label:'⤒', title:'Выровнять по верхнему краю (Alt+T)'},
      {role:'bottom', x:aBtnX+66,   label:'⤓', title:'Выровнять по нижнему краю (Alt+B)'},
    ];
    for(const b of ALIGN_BTNS){
      svg.appendChild(el('rect',{
        x:b.x-9, y:alignY-9, width:18, height:18, rx:3,
        fill:'#2ecc71', stroke:'#000','stroke-width':1.2,
        style:'cursor:pointer',
        'data-kind':'group-align','data-role':b.role,
      }));
      svg.appendChild(el('text',{
        x:b.x, y:alignY+4,
        'text-anchor':'middle','font-size':14,fill:'#fff','font-weight':'bold',
        'font-family':'sans-serif','pointer-events':'none',
      },b.label));
      // невидимый title через <title>
      const t=el('title',{},b.title);
      svg.lastChild.appendChild(t);
    }
  }
  // 6 ручек по сторонам для L-углового прилавка
  const singleForL=selectionSingle();
  if(singleForL && singleForL.type==='stall'){
    const s=stalls[singleForL.id];
    if(s && s.shape==='L' && s.cut){
      const rot=s.r||0;
      const cx=s.x+s.w/2, cy=s.y+s.h/2;
      const cs=Math.cos(rot*Math.PI/180), sn=Math.sin(rot*Math.PI/180);
      for(const ed of lEdges(s)){
        let mx=(ed.x1+ed.x2)/2, my=(ed.y1+ed.y2)/2;
        if(rot){const dx=mx-cx, dy=my-cy; mx=cx+dx*cs-dy*sn; my=cy+dx*sn+dy*cs;}
        svg.appendChild(el('rect',{
          x:mx-2.5, y:my-2.5, width:5, height:5,
          fill:'#ffe600', stroke:'#000', 'stroke-width':0.5,
          style:`cursor:${ed.o==='h'?'ns-resize':'ew-resize'}`,
          'data-kind':'l-side','data-role':ed.role,'data-id':singleForL.id,
        }));
      }
    }
  }
  // вершины потока — для одиночно выбранного потока
  const single=selectionSingle();
  if(single && single.type==='flow'){
    const f=flows.find(p=>p.id===single.id);
    if(f){
      f.points.forEach((p,i)=>{
        svg.appendChild(el('circle',{
          cx:p[0],cy:p[1],r:5,
          fill:'#fff',stroke:'#000','stroke-width':1.5,
          style:'cursor:move',
          'data-id':single.id,'data-idx':i,'data-kind':'flow-vertex',
        }));
      });
    }
  }
}
